// B21.1: lastRange() видалено — мертвий код (жодного виклику; запас ходу годує лише latestRange-fallback Tab-3)
// month-to-date пробіг: baseline = останній одометр ПОПЕРЕДНЬОГО місяця (як у маршрутному листі)
function odoEvents(){
  const ev=[];
  S.records.forEach(r=>{if(r.odo!=null)ev.push({date:r.date,time:r.time,odo:+r.odo});});
  S.refuels.forEach(r=>{if(r.odo!=null)ev.push({date:r.date,time:r.time,odo:+r.odo});});
  ev.sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));
  return ev;
}
function monthProgress(day){
  const a=day.split('-').map(Number), monthStart=a[0]+'-'+pad(a[1])+'-01';
  const ev=odoEvents();
  let startOdo=null,endOdo=null,firstInMonth=null;
  ev.forEach(e=>{
    if(e.date<monthStart) startOdo=e.odo;                       // останній перед місяцем
    if(e.date>=monthStart && e.date<=day && firstInMonth==null) firstInMonth=e.odo;
    if(e.date<=day) endOdo=e.odo;                               // останній до активного дня включно
  });
  if(startOdo==null) startOdo=firstInMonth;                     // fallback: перший запис місяця
  const km=(startOdo!=null&&endOdo!=null&&endOdo>=startOdo)?endOdo-startOdo:null;
  return {startOdo,endOdo,km};
}

function addDays(iso,delta){const a=iso.split('-').map(Number);const dt=new Date(a[0],a[1]-1,a[2]);dt.setDate(dt.getDate()+delta);return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());}
function dowISO(iso){const a=iso.split('-').map(Number);return new Date(a[0],a[1]-1,a[2]).getDay();}
function weekKey(iso){const a=iso.split('-').map(Number);const dt=new Date(Date.UTC(a[0],a[1]-1,a[2]));const day=(dt.getUTCDay()+6)%7;dt.setUTCDate(dt.getUTCDate()-day+3);const f=new Date(Date.UTC(dt.getUTCFullYear(),0,4));const wk=1+Math.round(((dt-f)/864e5-3+((f.getUTCDay()+6)%7))/7);return dt.getUTCFullYear()+'-W'+wk;}
function relDay(iso){if(isToday(iso))return 'Сьогодні';if(iso===addDays(todayISO(),-1))return 'Вчора';return WD_FULL[dowISO(iso)];}
function plural(n,f){const a=n%10,b=n%100;if(a===1&&b!==11)return f[0];if(a>=2&&a<=4&&(b<10||b>=20))return f[1];return f[2];}
// ---------- scope / range (batch11) ----------
const MON_SHORT=['січ','лют','бер','кві','тра','чер','лип','сер','вер','жов','лис','гру'];

// ============================================================
// Tab 3 — Паливо (Batch 13): аналітика, без фейкових чисел
// ============================================================
// UX2: місткість бака рухома → lPerTick() (функція з SETTINGS.tankL), не заморожена const
function f1(n){return (Math.round(n*10)/10).toFixed(1);}
function money(n){return fmtNum(n)+'\u00A0₴';}

// --- scope (rolling window, відвʼязано від scope Журналу) ---
function fuelScopeCutoff(){if(S.fuelScope==='all')return null;return addDays(todayISO(),-(S.fuelScope==='m'?30:90));}
function inFuelScope(d){const c=fuelScopeCutoff();return !c||d>=c;}

// --- readings / refuels ---
function fuelReadings(){
  const ev=[];
  S.records.forEach(r=>{if(r.fuel!=null)ev.push({date:r.date,time:r.time,fuel:+r.fuel,range:r.range!=null?+r.range:null});});
  S.refuels.forEach(r=>{if(r.fuel!=null)ev.push({date:r.date,time:r.time,fuel:+r.fuel,range:null});});
  ev.sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));
  return ev;
}
function currentFuel(){const ev=fuelReadings();return ev.length?ev[ev.length-1]:null;}
function latestRange(){let best=null;S.records.forEach(r=>{if(r.range!=null){const key=r.date+r.time;if(!best||key>best.key)best={key,range:+r.range};}});return best?best.range:null;}
function refuelsChrono(){return S.refuels.slice().filter(r=>r.odo!=null).sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));}
function scopedRefuels(){return refuelsChrono().filter(r=>inFuelScope(r.date));}

// --- tank-to-tank сегменти + запобіжник проти сміття ---
function tankSegments(){
  const rf=refuelsChrono(), segs=[];
  for(let i=1;i<rf.length;i++){
    const A=rf[i-1], B=rf[i], dist=(+B.odo)-(+A.odo), litersB=(B.liters!=null)?+B.liters:null;
    if(litersB==null||!(dist>0)){segs.push({B,dist,l100:null,plausible:false});continue;}
    const spent=((+A.fuel - +B.fuel)*lPerTick())+litersB;
    const l100=spent/dist*100;
    const plausible=(dist>=50 && l100>=3 && l100<=25 && spent>0);
    segs.push({B,dist,spent,l100,plausible});
  }
  return segs;
}
function scopedSegments(){return tankSegments().filter(s=>inFuelScope(s.B.date));}
function avgL100(){const ok=scopedSegments().filter(s=>s.plausible);if(!ok.length)return null;const sl=ok.reduce((a,s)=>a+s.spent,0),sd=ok.reduce((a,s)=>a+s.dist,0);return sd>0?sl/sd*100:null;} // b15: pooled (зважений за пробігом), не mean-of-ratios

// --- distance / money / split / cadence ---
function scopedDistance(){
  // B21: span включає START-одометри → власна відстань першої поїздки не губиться (+46 на seed, 1662→1708).
  // НЕ через odoEvents (лише END-и) — інакше перша поїздка втрачає свій старт.
  const vals=[];
  S.records.forEach(r=>{if(inFuelScope(r.date)){if(r.odo!=null)vals.push(+r.odo);if(r.odoStart!=null)vals.push(+r.odoStart);}});
  S.refuels.forEach(r=>{if(inFuelScope(r.date)&&r.odo!=null)vals.push(+r.odo);});
  if(vals.length<2)return null;
  const mx=Math.max.apply(null,vals),mn=Math.min.apply(null,vals);
  return mx>mn?mx-mn:null;
}
function refuelCost(r){return (r.sum!=null)?+r.sum:((r.liters!=null&&r.price!=null)?(+r.liters*+r.price):0);}
function fuelMoney(){
  const rf=scopedRefuels();let cost=0,lit=0;
  rf.forEach(r=>{cost+=refuelCost(r);if(r.liters!=null)lit+=+r.liters;});
  const avgPrice=lit>0?cost/lit:null, cons=avgL100();
  // b15: вартість/100 виводиться з розходу (cons×ціна) — завжди узгоджена з «Мій розхід», не окрема база відстані
  return {cost,liters:lit,count:rf.length,avgPrice,cons,per100:(cons!=null&&avgPrice!=null)?cons*avgPrice:null,avgFill:rf.length?lit/rf.length:null};
}
function fuelSplit(){
  let wk=0,vk=0;
  S.records.forEach(r=>{if(!inFuelScope(r.date))return;const k=tripKm(r)||0;if(r.type==='work')wk+=k;else vk+=k;});
  // b15: атрибуція лише за залогованими км (км×розхід), а не розкидання всього купленого палива.
  // unlog = реально проїхано (одометр) − залоговано; робить неповноту видимою (лікує L1+L3).
  const m=fuelMoney(), cons=m.cons, cpl=m.avgPrice;
  const odo=scopedDistance(), logged=wk+vk, unlog=(odo!=null&&odo>logged)?odo-logged:0;
  const base=Math.max(odo!=null?odo:0,logged);   // B21.1: при перекритті START (logged>span) ширини не вилазять; норма (odo≥logged) — без змін
  const wLit=cons!=null?wk*cons/100:null, vLit=cons!=null?vk*cons/100:null;
  return {wk,vk,logged,unlog,odo,tot:logged,
    wW:base>0?wk/base*100:0, vW:base>0?vk/base*100:0, uW:base>0?unlog/base*100:0,
    unlogPct:base>0?Math.round(unlog/base*100):0,
    wLit,vLit,wCost:(wLit!=null&&cpl!=null)?wLit*cpl:null, vCost:(vLit!=null&&cpl!=null)?vLit*cpl:null};
}
function fuelCadence(){
  const rf=scopedRefuels();if(rf.length<2)return null;
  const A=rf[0],B=rf[rf.length-1],a=A.date.split('-').map(Number),b=B.date.split('-').map(Number);
  const days=Math.round((new Date(b[0],b[1]-1,b[2])-new Date(a[0],a[1]-1,a[2]))/864e5);
  const km=(B.odo!=null&&A.odo!=null)?(+B.odo-+A.odo):null, gaps=rf.length-1;
  return {days:gaps?Math.round(days/gaps):null,km:(km!=null&&gaps)?Math.round(km/gaps):null};
}
function topStations(){
  const m={};
  scopedRefuels().forEach(r=>{const k=r.azs||'—';(m[k]||(m[k]={azs:k,count:0,lit:0,cost:0}));m[k].count++;if(r.liters!=null)m[k].lit+=+r.liters;m[k].cost+=refuelCost(r);});
  return Object.values(m).map(o=>(o.avgPrice=o.lit>0?o.cost/o.lit:null,o)).sort((a,b)=>b.count-a.count).slice(0,3);
}

// --- SVG helpers ---
// b16a: RESERVED — примітив під відкладений Tab-1 hero sparkline (C2, feedback log). Tab-3 виклики прибрано (D2). Не видаляти без рішення.
function sparkline(vals){
  if(!vals||vals.length<2)return '';
  const w=88,h=30,pad=4,mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=(mx-mn)||1;
  const pts=vals.map((v,i)=>[pad+(w-2*pad)*i/(vals.length-1),h-pad-(h-2*pad)*(v-mn)/rng]);
  const d=pts.map((q,i)=>(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)).join(' '),last=pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" fill="none"><path d="${d}" stroke="var(--info)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.6" fill="var(--info)"/></svg>`;
}

// --- block renderers ---
// R1: компактний горизонтальний стан-бар — read-only echo гейджа форми (display-only, pointer-events:none)
function stateBlock(cur){
  const lvl=cur.fuel,lit=Math.round(lvl*lPerTick()),avg=avgL100();
  let range=null,approx=false;
  if(avg){range=Math.round(lvl*lPerTick()*100/avg);approx=true;}  // b15: app-оцінка (рівень/розхід) — за замовчуванням, узгоджена з «Мій розхід»
  else {range=latestRange();}                                     // fallback: ручне з борткомпʼютера, поки розходу ще нема
  const low=lvl<=3,meta=(range!=null)?`${lvl}/12 · ${approx?'≈':''}${fmtNum(range)} км запас`:`${lvl}/12`;
  const DROP='<path d="M12 2.5S5 10 5 14.5a7 7 0 0 0 14 0C19 10 12 2.5 12 2.5z"/>';
  let groups='';
  for(let g=0;g<4;g++){let cells='';for(let k=1;k<=3;k++){const idx=g*3+k;cells+=`<span class="fs-cell${idx<=lvl?' on':''}"></span>`;}groups+=`<div class="fs-group">${cells}</div>`;}
  return `<section class="fl-card fl-state${low?' low':''}">
    <div class="sec-h"><span class="sec-t">Зараз у баку</span></div>
    <div class="fs-top">
      <div class="fs-liters"><span class="fs-chip"><svg class="fs-drop" viewBox="0 0 24 24" fill="currentColor">${DROP}</svg></span><span class="fs-num"><span class="fs-approx">≈</span>\u202F${lit}<span class="fs-unit"> л</span></span></div>
      <div class="fs-meta">${esc(meta)}</div>
    </div>
    <div class="fs-bar" aria-hidden="true">
      <span class="fs-end fs-end-e"><svg class="fs-edrop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${DROP}</svg><span>E</span></span>
      <div class="fs-grid">${groups}</div>
      <span class="fs-end fs-end-f"><svg class="fs-edrop" viewBox="0 0 24 24" fill="currentColor">${DROP}</svg><span>F</span></span>
    </div>
    <div class="fs-scale" aria-hidden="true"><span class="fs-end-sp"></span><div class="fs-sgrid"><div class="fs-sg"><i class="fs-tick"></i></div><div class="fs-sg"><i class="fs-tick half"></i></div><div class="fs-sg"><i class="fs-tick"></i></div><div class="fs-sg"></div></div><span class="fs-end-sp"></span></div>
    ${low?`<div class="fs-warn">Низький рівень — час заправитись</div>`:''}
  </section>`;
}
function consumptionBlock(){
  const head=`<div class="sec-h"><span class="sec-t">Мій розхід</span><span class="sec-c">за заправками</span></div>`;
  const segs=scopedSegments(),ok=segs.filter(s=>s.plausible),skip=segs.length-ok.length;
  if(!ok.length)return `<section class="fl-card">${head}<div class="fl-note">Потрібно щонайменше дві заправки з одометром, щоб порахувати розхід.</div></section>`;
  const avg=avgL100(),last=ok[ok.length-1].l100,delta=last-avg;
  const dir=delta<-0.05?'down':(delta>0.05?'up':'flat'),arrow=dir==='down'?'↓':(dir==='up'?'↑':'→');
  const skipNote=skip>0?`<div class="fl-skip">${skip} ${plural(skip,['відрізок','відрізки','відрізків'])} не враховано (доливка / мало км)</div>`:'';
  return `<section class="fl-card">${head}
    <div class="fc-row">
      <div class="fc-main"><div class="fc-val">${f1(avg)}<span> л/100</span></div>
        <div class="fc-lbl">середній за період${dir!=='flat'?` · <span class="fc-trend ${dir}">${arrow}\u202F${f1(Math.abs(delta))}</span> ост. бак`:''}</div></div>
    </div>${skipNote}
  </section>`;
}
function splitBlock(){
  const head=`<div class="sec-h"><span class="sec-t">Робота / Вайб</span><span class="sec-c">за пробігом</span></div>`;
  const sp=fuelSplit();
  if(sp.tot<=0)return `<section class="fl-card">${head}<div class="fl-note">Немає записів з пробігом за цей період.</div></section>`;
  const lk=sp.wLit!=null, ck=sp.wCost!=null;

  let wW=sp.wW,vW=sp.vW,uW=sp.uW;

// ---- календарні хелпери місяця ----
function curMonth(){const d=new Date();return {y:d.getFullYear(),m:d.getMonth()+1};}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function isCurMonth(y,m){const c=curMonth();return y===c.y&&m===c.m;}
function prevMonthOf(y,m){return m===1?{y:y-1,m:12}:{y:y,m:m-1};}
function monthCapDay(y,m){return isCurMonth(y,m)?new Date().getDate():daysInMonth(y,m);}
function monthStartISO(y,m){return y+'-'+pad(m)+'-01';}
function monthEndISO(y,m,cap){return y+'-'+pad(m)+'-'+pad(Math.min(cap,daysInMonth(y,m)));}
function seasonOf(m){return (m===12||m<=2)?'winter':(m<=5?'spring':(m<=8?'summer':'autumn'));}
function fmtDM(iso){const a=iso.split('-');return a[2]+'.'+a[1];}

// ---- метрики у вікні [monthStart..endISO] (фільтр-залежні, окрім повного одометра й розходу) ----
function monthTripRecords(y,m,endISO){
  const s=monthStartISO(y,m);
  let rs=S.records.filter(r=>r.date>=s&&r.date<=endISO);
  if(S.filter!=='all') rs=rs.filter(r=>r.type===(S.filter==='work'?'work':'vibe'));
  return rs;
}
function monthFullKm(y,m,endISO){return monthProgress(endISO).km;}                 // повний одометр (не за типом)
function monthTypedKm(y,m,endISO){return monthTripRecords(y,m,endISO).reduce((a,r)=>a+(tripKm(r)||0),0);}
function monthLoggedAll(y,m,endISO){const s=monthStartISO(y,m);return S.records.filter(r=>r.date>=s&&r.date<=endISO).reduce((a,r)=>a+(tripKm(r)||0),0);}
function monthHeroKm(y,m,endISO){return S.filter==='all'?monthFullKm(y,m,endISO):monthTypedKm(y,m,endISO);}
function monthActiveDays(y,m,endISO){const set={};monthTripRecords(y,m,endISO).forEach(r=>{set[r.date]=1;});return Object.keys(set).length;}
// розхід: пулений л/100 по плаузібельних бак-сегментах, чия ЗАКРИВАЮЧА заправка (B) у вікні (метод C). null якщо нема.
function monthConsumption(y,m,endISO){
  const s=monthStartISO(y,m);
  const ok=tankSegments().filter(seg=>seg.B.date>=s&&seg.B.date<=endISO&&seg.plausible);
  if(!ok.length)return null;
  const sl=ok.reduce((a,x)=>a+x.spent,0),sd=ok.reduce((a,x)=>a+x.dist,0);
  return sd>0?sl/sd*100:null;
}
// ритм (у межах місяця, день 1..cap; фільтр-залежний)
function monthRhythm(y,m){
  const cap=monthCapDay(y,m), endISO=monthEndISO(y,m,cap);
  const byDay={};
  monthTripRecords(y,m,endISO).forEach(r=>{(byDay[r.date]=byDay[r.date]||[]).push(r);});
  let top=null,sumKm=0,active=0;
  Object.keys(byDay).forEach(iso=>{const km=byDay[iso].reduce((a,r)=>a+(tripKm(r)||0),0);active++;sumKm+=km;if(!top||km>top.km)top={iso,km};});
  let pause=null,run=0,runStart=null;
  for(let d=1;d<=cap;d++){
    const iso=y+'-'+pad(m)+'-'+pad(d);
    if(byDay[iso]){run=0;runStart=null;}
    else{if(run===0)runStart=d;run++;if(!pause||run>pause.len)pause={len:run,start:runStart,end:d};}
  }
  return {cap,active,sumKm,top,pause,avg:active?Math.round(sumKm/active):null};
}

// ---- дельта (без червоного: зелений=змінилось, напрям несе стрілка) ----
function deltaObj(cur,prev){
  if(cur==null||prev==null)return {has:false};
  const abs=cur-prev, pct=(prev!==0)?Math.round(abs/prev*100):null;
  const dir=Math.abs(abs)<1e-9?'flat':(abs>0?'up':'down');
  return {has:true,abs:abs,pct:pct,dir:dir};
}
function sgn(n){return n>0?'+':(n<0?'\u2212':'');}                                   // \u2212 = типографський мінус
function arrowOf(dir){return dir==='up'?'↑':(dir==='down'?'↓':'→');}
function deltaBlockKm(cur,prev){
  const d=deltaObj(cur,prev);
  if(!d.has)return `<div class="dmb-delta flat"><div class="dmb-pct">—</div></div>`;
  const pct=d.pct!=null?(sgn(d.pct)+Math.abs(d.pct)+'%'):'—';
  return `<div class="dmb-delta ${d.dir}"><div class="dmb-pct">${pct}</div><div class="dmb-arrow">${arrowOf(d.dir)}</div><div class="dmb-abs">${sgn(d.abs)}${fmtNum(Math.abs(d.abs))} км</div></div>`;
}
function deltaBlockCons(cur,prev){
  const d=deltaObj(cur,prev);
  if(!d.has)return `<div class="dmb-delta flat"><div class="dmb-pct">—</div></div>`;
  return `<div class="dmb-delta ${d.dir}"><div class="dmb-pct">${sgn(d.abs)}${f1(Math.abs(d.abs))}</div><div class="dmb-arrow">${arrowOf(d.dir)}</div><div class="dmb-abs">л/100</div></div>`;
}
function deltaBlockDays(cur,prev){
  const d=deltaObj(cur,prev);
  if(!d.has)return `<div class="dmb-delta flat"><div class="dmb-pct">—</div></div>`;
  const n=Math.abs(d.abs);
  return `<div class="dmb-delta ${d.dir}"><div class="dmb-pct">${sgn(d.abs)}${n}<span style="font-size:11px;font-weight:700"> ${plural(n,['день','дні','днів'])}</span></div><div class="dmb-arrow">${arrowOf(d.dir)}</div></div>`;
}

// ---- гантеля ----
function dmbRow(ico,fuelCls,name,curStr,prevStr,curWhen,prevWhen,deltaHTML,muted,why){
  return `<div class="dmb${muted?' muted':''}">

      </div>
      ${why?`<div class="dmb-why">${esc(why)}</div>`:''}
    </div>
    ${deltaHTML}
  </div>`;
}

// ---- синопсис банера ----
function monthSynopsis(y,m,endISO,heroCur,heroPrev){
  let dom='';
  if(S.filter==='all'){
    const s=monthStartISO(y,m);let wk=0,vk=0;
    S.records.filter(r=>r.date>=s&&r.date<=endISO).forEach(r=>{const k=tripKm(r)||0;if(r.type==='work')wk+=k;else vk+=k;});
    if(wk===0&&vk===0)dom='';
    else if(wk>=vk*1.4)dom='здебільшого робочі';
    else if(vk>=wk*1.4)dom='здебільшого вайб';
    else dom='робочі й вайб порівну';
  }else dom=(S.filter==='work'?'робочі поїздки':'вайб-поїздки');
  const pm=prevMonthOf(y,m), pgen='до '+MON_GEN[pm.m-1];
  let dphr;
  if(heroPrev==null||heroPrev===0)dphr='перший місяць історії';
  else{const pct=Math.round((heroCur-heroPrev)/heroPrev*100);dphr=(pct===0)?('як у '+MON_GEN[pm.m-1]):(sgn(pct)+Math.abs(pct)+'% '+pgen);}
  const tail=isCurMonth(y,m)?(' (до '+pad(monthCapDay(y,m))+'.'+pad(m)+')'):'';
  return [dom,dphr].filter(Boolean).join(', ')+tail;
}

function monthStep(dir){
  let y=S.monthView.y, m=S.monthView.m+dir;
  if(m<1){m=12;y--;} if(m>12){m=1;y++;}
  const c=curMonth();
  if(y>c.y||(y===c.y&&m>c.m))return;                 // не в майбутнє (нема даних)
  S.monthView={y:y,m:m}; renderMonth();
}
// свайп = бонус (axis-lock end-only, Cookbook A22); тап стрілками — основний
function bindMonthSwipe(el){
  if(el._mSw)return; el._mSw=true;
  let sx=0,sy=0,ax=null;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;ax=null;},{passive:true});
  el.addEventListener('touchmove',e=>{const cx=e.touches[0].clientX-sx,cy=e.touches[0].clientY-sy;if(ax===null&&(Math.abs(cx)>10||Math.abs(cy)>10))ax=Math.abs(cx)>Math.abs(cy)?'x':'y';},{passive:true});
  el.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(ax==='x'&&Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50)monthStep(dx<0?1:-1);},{passive:true});
}

function buildFuel(containerId,initial){
  const c=$(containerId);
  c._fuel=initial;
  let groups='';
  for(let g=0;g<4;g++){
    let cells='';
    for(let k=1;k<=3;k++){const idx=g*3+k;cells+=`<div class="fg-cell" data-idx="${idx}"></div>`;}
    groups+=`<div class="fg-group">${cells}</div>`;
  }
  c.innerHTML=`<div class="fg-wrap"><span class="fg-end fg-end-e"><svg class="fg-drop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.5S5 10 5 14.5a7 7 0 0 0 14 0C19 10 12 2.5 12 2.5z"/></svg><span class="fg-lbl">E</span></span><div class="fg-grid" id="${containerId}-grid">${groups}</div><span class="fg-end fg-end-f"><svg class="fg-drop fg-drop-full" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5S5 10 5 14.5a7 7 0 0 0 14 0C19 10 12 2.5 12 2.5z"/></svg><span class="fg-lbl">F</span></span></div><div class="fg-val" id="${containerId}-val"></div>`;
  const grid=$(containerId+'-grid');
  function paint(){
    grid.querySelectorAll('.fg-cell').forEach(cell=>{
      cell.classList.toggle('on',(+cell.dataset.idx)<=c._fuel);
    });
    $(containerId+'-val').innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5S5 10 5 14.5a7 7 0 0 0 14 0C19 10 12 2.5 12 2.5z"/></svg><span><b>${c._fuel}/12</b> · ≈ ${liters(c._fuel)} л</span>`;
  }
  function setVal(v,pulse){
    v=Math.max(1,Math.min(12,v));
    if(v!==c._fuel){c._fuel=v;if(navigator.vibrate)try{navigator.vibrate(5);}catch(e){}}
    paint();
    if(pulse){const cell=grid.querySelector(`.fg-cell[data-idx="${v}"]`);if(cell){cell.classList.add('pulse');setTimeout(()=>cell.classList.remove('pulse'),120);}}
  }
  function idxFromX(clientX){
    const r=grid.getBoundingClientRect();
    const frac=(clientX-r.left)/r.width;
    return Math.ceil(frac*12);
  }
  grid.querySelectorAll('.fg-cell').forEach(cell=>{
    cell.addEventListener('click',()=>setVal(+cell.dataset.idx,true));
  });
  let drag=false;
  grid.addEventListener('touchstart',e=>{drag=true;setVal(idxFromX(e.touches[0].clientX),true);},{passive:true});
  grid.addEventListener('touchmove',e=>{if(drag)setVal(idxFromX(e.touches[0].clientX),true);},{passive:true});
  grid.addEventListener('touchend',()=>{drag=false;},{passive:true});
  paint();
}

// B21: зміна дати/часу → re-prefill START, якщо користувач його ще не чіпав
function rePrefillStart(){
  if(S.odoStartDirty)return;
  const st=prevEndBefore($('r-date').value,$('r-time').value,S.editRecId);
  $('r-odo-start').value=(st!=null)?st:'';

// B21: останній відомий одометр (END запису / odo заправки) СТРОГО до (date,time), глобально, виключаючи exclId
function prevEndBefore(date,time,exclId){
  let best=null;
  const scan=(arr,skip)=>arr.forEach(r=>{if(skip&&r.id===exclId)return;if(r.odo==null)return;const before=(r.date<date)||(r.date===date&&r.time<time);if(before){const key=r.date+r.time;if(!best||key>best.key)best={key,odo:+r.odo};}});
  scan(S.records,true);scan(S.refuels,false);
  return best?best.odo:null;
}

const AZS=['WOG','ОККО','UPG','SOCAR','Укрнафта','БРСМ-Нафта','AMIC','KLO','Motto','Параллель'];

function makePicker(cfg){ // cfg:{root,btn,cur,list,options,allowOther,otherInput}
  const root=$(cfg.root),btn=$(cfg.btn),cur=$(cfg.cur),list=$(cfg.list);
  const norm=o=>typeof o==='string'?{v:o,l:o}:o;
  function build(){
    list.innerHTML=cfg.options.map(o=>{const x=norm(o);return `<button type="button" class="pk-opt" data-val="${esc(x.v)}">${esc(x.l)}</button>`;}).join('')
      +(cfg.allowOther?`<button type="button" class="pk-opt other" data-val="__other">Інша…</button>`:'');
  }
  function mark(val){list.querySelectorAll('.pk-opt').forEach(o=>o.classList.toggle('sel',o.dataset.val===val));}
  function set(val,label){btn.dataset.val=val;cur.textContent=label;mark(val);}
  function open(o){root.classList.toggle('open',o);list.hidden=!o;}
  build();
  btn.addEventListener('click',()=>open(list.hidden));
  list.addEventListener('click',e=>{
    const opt=e.target.closest('.pk-opt');if(!opt)return;
    const val=opt.dataset.val;
    if(cfg.allowOther&&val==='__other'){
      set('__other','Інша…');open(false);
      const other=$(cfg.otherInput);other.style.display='block';other.focus(); // синхронно у gesture → клавіатура без блимання (F12)
    }else{
      set(val,opt.textContent);open(false);
      if(cfg.otherInput)$(cfg.otherInput).style.display='none';
    }
  });
  document.addEventListener('click',e=>{if(!list.hidden&&!e.target.closest('#'+cfg.root))open(false);});
  return {set,open,build,get:()=>btn.dataset.val};
}

const SW_SLOP=10, SW_TRIG=44;
function closeAllSwipe(except){document.querySelectorAll('.sw-row.sw-open').forEach(r=>{if(r!==except)r.classList.remove('sw-open');});}
function rowEdit(kind,id){if(kind==='rec')openRecordForm(id);else openRefuelForm(id);}
function rowDelete(kind,id){
  if(kind==='rec'){
    const r=S.records.find(x=>x.id===id);
    confirmAction('Видалити запис?', r?`${esc(r.time)} · ${esc(r.route)}${tripKm(r)!=null?' · '+tripKm(r)+' км':''}`:'',
      ()=>{S.records=S.records.filter(x=>x.id!==id);saveData();render();syncCycle();toast('Видалено');});
  }else{
    const r=S.refuels.find(x=>x.id===id);
    confirmAction('Видалити заправку?', r?`${esc(r.time)} · ${esc(r.azs)} · ${esc(r.liters)} л`:'',
      ()=>{S.refuels=S.refuels.filter(x=>x.id!==id);saveData();render();syncCycle();toast('Видалено');});
  }
}
function bindSwipeRows(container){
  container.querySelectorAll('.sw-row').forEach(row=>{
    if(row._sw)return;row._sw=true;
    const front=row.querySelector('.rec,.rf');
    const id=row.dataset.id, kind=row.dataset.kind;
    let sx=0,sy=0,moved=false,axis=null;
    front.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;moved=false;axis=null;},{passive:true});
    front.addEventListener('touchmove',e=>{
      const cx=e.touches[0].clientX-sx, cy=e.touches[0].clientY-sy;
      if(axis===null && (Math.abs(cx)>SW_SLOP||Math.abs(cy)>SW_SLOP)) axis=Math.abs(cx)>Math.abs(cy)?'x':'y';
      if(Math.abs(cx)>SW_SLOP||Math.abs(cy)>SW_SLOP) moved=true;
      if(axis==='x') e.preventDefault();   // горизонт. намір → блок нативного скролу (no page-jump при закритті)
    },{passive:false});
    front.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
      const open=row.classList.contains('sw-open');
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>SW_TRIG){            // горизонтальний свайп
        if(dx<0){closeAllSwipe(row);row.classList.add('sw-open');}     // вліво → відкрити дії
        else row.classList.remove('sw-open');                         // вправо → закрити
        return;
      }
      if(!moved){                                                     // тап (не свайп)
        if(open)row.classList.remove('sw-open');                      // відкритий → закрити
        else rowEdit(kind,id);                                        // закритий → редагувати
      }
    },{passive:true});
    row.querySelectorAll('.sw-act').forEach(b=>{
      b.addEventListener('click',e=>{e.stopPropagation();row.classList.remove('sw-open');
        if(b.dataset.act==='edit')rowEdit(kind,id);else rowDelete(kind,id);});
    });
  });
}

// ----- Range calendar (batch11): tap start → tap end → Показати -----
let calView=null, calS=null, calE=null;   // calView={y,m(1-12)}; calS/calE temp ISO
function calOpen(){
  const base=(S.scopeStart||S.activeDay).split('-').map(Number);
  calView={y:base[0],m:base[1]};
  calS=S.scopeStart||null; calE=S.scopeEnd||null;
  renderCal(); openSheet('sh-date');
}
function calCellISO(d){return calView.y+'-'+pad(calView.m)+'-'+pad(d);}
function renderCal(){
  $('calMY').textContent=MON_NOM[calView.m-1]+' '+calView.y;
  const firstISO=calView.y+'-'+pad(calView.m)+'-01';
  const lead=(dowISO(firstISO)+6)%7;                       // Monday-first offset
  const dim=new Date(calView.y,calView.m,0).getDate();     // днів у місяці
  const tIso=todayISO();
  const s=calS, e=calE||calS, lo=s?(s<e?s:e):null, hi=s?(s<e?e:s):null;
  let g='';
  for(let i=0;i<lead;i++)g+='<div class="cal-c blank"></div>';
  for(let d=1;d<=dim;d++){
    const iso=calCellISO(d); let cls='cal-c';
    if(s){
      if(iso===lo&&iso===hi)cls+=' r3';
      else if(iso===lo)cls+=' r1';
      else if(iso===hi)cls+=' r2';
      else if(iso>lo&&iso<hi)cls+=' r0';
    }
    if(iso===tIso)cls+=' today';
    g+=`<div class="${cls}" data-d="${d}">${d}</div>`;
  }
  $('calGrid').innerHTML=g;
  $('calHint').textContent = (calS&&calE&&calS!==calE) ? fmtRange(lo,hi)
                            : calS ? fmtShort(calS)+' — тапни кінець діапазону'
                            : 'Тапни день — або початок і кінець діапазону';
}
function calTap(d){
  const iso=calCellISO(d);
  if(!calS||(calS&&calE)){calS=iso;calE=null;}             // новий старт
  else{calE=iso;}                                          // 2-й тап = кінець (renderCal нормалізує lo/hi)
  renderCal();
}

const THEME_KEY='dl-theme';
function getThemeMode(){try{return localStorage.getItem(THEME_KEY)||'auto';}catch(e){return 'auto';}}
function applyTheme(){
  const mode=getThemeMode();
  const dark=mode==='dark'||(mode==='auto'&&matchMedia('(prefers-color-scheme:dark)').matches);
  const html=document.documentElement;
  html.setAttribute('data-theme',dark?'dark':'light');
  html.setAttribute('data-theme-mode',mode);
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.content=dark?'#0D1110':'#F4F7F5';
  document.querySelectorAll('.theme-item').forEach(it=>it.classList.toggle('active',it.dataset.mode===mode));
  const lbl=mode==='auto'?'Системна':mode==='dark'?'Темна':'Світла';
  $('btnTheme').setAttribute('aria-label','Тема: '+lbl);
}
function setThemeMode(mode){try{if(mode==='auto')localStorage.removeItem(THEME_KEY);else localStorage.setItem(THEME_KEY,mode);}catch(e){}applyTheme();}

matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if(getThemeMode()==='auto')applyTheme();});
