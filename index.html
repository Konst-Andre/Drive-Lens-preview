<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Drive Lens">
<!-- theme-color (dynamic) — оновлюється inline script нижче і toggle JS. Default dark для PWA splash. -->
<meta name="theme-color" content="#0D1110">
<!-- FOUC fix — встановити data-theme ДО CSS apply і first paint (wsd Кластер 9). iOS 18+ live listener у body JS. -->
<script>
  (function(){
    try {
      var saved = localStorage.getItem('dl-theme');           // null|'auto'|'light'|'dark'
      var mode  = saved || 'auto';
      var dark  = mode === 'dark' || (mode === 'auto' && matchMedia('(prefers-color-scheme:dark)').matches);
      var html  = document.documentElement;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      html.setAttribute('data-theme-mode', mode);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.content = dark ? '#0D1110' : '#F4F7F5';
    } catch(e) {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.setAttribute('data-theme-mode', 'auto');
    }
  })();
</script>
<title>Drive Lens</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS v4 — Monochromatic Pine Forest (concept v1.3 Розділ H)
   Default = LIGHT. dark via [data-theme=dark] + auto media.
   ============================================================ */
:root{
  /* Surfaces (light mirror) */
  --surface-1:#F4F7F5; --surface-2:#FFFFFF; --surface-3:#E9EFEB; --surface-4:#DCE5E0;
  /* Text */
  --text-primary:#15201C; --text-secondary:#586660; --text-muted:#8A968F;
  /* Accent (Pine Forest mono) */
  --accent:#40916C; --accent-hover:#52B788; --accent-soft:#DCEDE3; --accent-text:#2E7355;
  /* Vibe (warm honey/ochre — особисті поїздки) */
  --vibe:#C9A86A; --vibe-soft:#F3E9D6; --vibe-text:#9C7430;
  /* Status (semantic, sparingly) */
  --ok:#2E9E5C; --warn:#C8841C; --crit:#C8331C; --info:#3E7C94;
  /* Neutral action (типо-агностична дія, напр. «Запис») — перлина, не макс-ink */
  --neutral:#3E4A45;
  /* Tab-4 банер: скрим під текстом-героя (Cookbook A42) — від surface-1 (вгорі, де текст) до прозорого */
  --scrim-1:rgba(244,247,245,.92); --scrim-2:rgba(244,247,245,.55);
  /* Borders */
  --border-subtle:rgba(0,0,0,.06); --border-default:rgba(0,0,0,.12); --border-accent:#40916C;
  /* App-bar */
  --appbar-bg:rgba(248,250,248,0.92);
  /* Shadows + radii */
  --sh1:0 1px 2px rgba(20,30,25,.05),0 2px 8px rgba(20,30,25,.05);
  --sh2:0 2px 6px rgba(20,30,25,.08),0 8px 24px rgba(20,30,25,.08);
  --r:14px; --rs:10px; --rxs:6px;
  --sab:env(safe-area-inset-bottom,0px);
  color-scheme:light;/* B19 #2: native-контроли (календар, time-пікер, спінери) у світлій темі */
}
[data-theme="dark"]{
  color-scheme:dark;/* B19 #2 */
  --surface-1:#0E1311; --surface-2:#1D2723; --surface-3:#2A3530; --surface-4:#36433C;
  --text-primary:#F0F4F2; --text-secondary:#A1AAA6; --text-muted:#6B7570;
  --accent:#40916C; --accent-hover:#52B788; --accent-soft:#1E3A2D; --accent-text:#4FAE7A;
  --vibe:#C9A86A; --vibe-soft:#332A18; --vibe-text:#D7B97D;
  --ok:#4FAE7A; --warn:#D4A055; --crit:#C75450; --info:#6B9BB8;
  --neutral:#CDD5D1;
  --scrim-1:rgba(14,19,17,.94); --scrim-2:rgba(14,19,17,.55);
  --border-subtle:rgba(255,255,255,.06); --border-default:rgba(255,255,255,.12); --border-accent:#40916C;
  --appbar-bg:rgba(13,17,16,0.92);
  --sh1:0 1px 2px rgba(0,0,0,.22),0 4px 12px rgba(0,0,0,.10);
  --sh2:0 2px 6px rgba(0,0,0,.28),0 12px 28px rgba(0,0,0,.14);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    color-scheme:dark;/* B19 #2 */
    --surface-1:#0E1311; --surface-2:#1D2723; --surface-3:#2A3530; --surface-4:#36433C;
    --text-primary:#F0F4F2; --text-secondary:#A1AAA6; --text-muted:#6B7570;
    --accent:#40916C; --accent-hover:#52B788; --accent-soft:#1E3A2D; --accent-text:#4FAE7A;
    --vibe:#C9A86A; --vibe-soft:#332A18; --vibe-text:#D7B97D;
    --ok:#4FAE7A; --warn:#D4A055; --crit:#C75450; --info:#6B9BB8;
    --neutral:#CDD5D1;
    --scrim-1:rgba(14,19,17,.94); --scrim-2:rgba(14,19,17,.55);
    --border-subtle:rgba(255,255,255,.06); --border-default:rgba(255,255,255,.12); --border-accent:#40916C;
    --appbar-bg:rgba(13,17,16,0.92);
    --sh1:0 1px 2px rgba(0,0,0,.22),0 4px 12px rgba(0,0,0,.10);
    --sh2:0 2px 6px rgba(0,0,0,.28),0 12px 28px rgba(0,0,0,.14);
  }
}

/* ===== iOS reset + system rules (concept v1.2 §14.20) ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#app{touch-action:pan-x pan-y}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;background:var(--surface-1)}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Manrope',sans-serif;background:var(--surface-1);color:var(--text-primary);font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
input,textarea,select{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default}
input,select,textarea{font-size:16px!important;font-family:inherit}      /* anti-zoom */
*{-webkit-tap-highlight-color:transparent}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
button:disabled{cursor:not-allowed}
.no-transition,.no-transition *{transition:none!important}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:var(--surface-1)}

/* ===== APP BAR ===== */
.app-bar{background:var(--surface-2);border-bottom:1px solid var(--border-subtle);padding:max(18px,calc(env(safe-area-inset-top,0px) + 12px)) 14px 8px;flex-shrink:0;z-index:20;position:relative;transition:box-shadow .15s,border-color .15s}
.app-bar.scrolled{box-shadow:var(--sh2)}
.bar-top{display:flex;align-items:center;gap:8px}
.brand{font-size:17px;font-weight:800;letter-spacing:-.5px;color:var(--text-primary);flex-shrink:0;line-height:1;pointer-events:none}
.brand em{color:var(--accent);font-style:normal}
[data-theme="dark"] .brand em{color:#52B788}
.brand,.app-bar,.bottom-nav,.filter-row{-webkit-user-select:none;user-select:none;touch-action:manipulation}

/* Avatar pill (opens action menu) */
.av-pill{flex:1 1 auto;max-width:230px;display:flex;align-items:center;gap:7px;background:var(--surface-3);border:1px solid var(--border-subtle);border-radius:20px;padding:4px 9px 4px 4px;color:var(--text-primary);font-size:13px;font-weight:600;min-width:0;transition:background .12s;cursor:pointer}
.av-pill:active{background:var(--surface-4)}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;border:1px solid var(--border-default)}
.av-nm{flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chev-ico{color:var(--text-muted);flex-shrink:0}

/* icon button (theme) */
.icon-btn{width:36px;height:36px;background:var(--surface-3);border:1px solid var(--border-subtle);border-radius:20px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex-shrink:0;cursor:pointer;transition:background .12s}
.icon-btn:active{background:var(--surface-4)}
.th-svg{overflow:visible}
.th-svg .th-sun,.th-svg .th-moon{transition:opacity .25s ease;transform-origin:center}
.th-svg .th-sun{opacity:0}.th-svg .th-moon{opacity:1}
[data-theme="light"] .th-svg .th-sun{opacity:1}[data-theme="light"] .th-svg .th-moon{opacity:0}
[data-theme="dark"] .th-svg .th-sun{opacity:0}[data-theme="dark"] .th-svg .th-moon{opacity:1}
.theme-wrap{position:relative;flex-shrink:0}
.theme-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:168px;background:var(--surface-2);border:1px solid var(--border-default);border-radius:var(--rs);box-shadow:var(--sh2);padding:4px;z-index:200;animation:tm-in .12s ease-out}
.theme-menu[hidden]{display:none}
@keyframes tm-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){.theme-menu{animation:none}}
.theme-item{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border-radius:var(--rxs);font-size:13px;color:var(--text-primary);text-align:left;transition:background .1s;cursor:pointer}
.theme-item:active{background:var(--surface-3)}
.theme-item .ti-icon{flex-shrink:0;color:var(--text-secondary)}
.theme-item .ti-label{flex:1}
.theme-item .ti-check{flex-shrink:0;color:var(--accent);opacity:0;transition:opacity .1s}
.theme-item.active{color:var(--accent);font-weight:600}
.theme-item.active .ti-icon{color:var(--accent)}
.theme-item.active .ti-check{opacity:1}

/* Sync pill — 4 state (concept v1.3 §3.5). Quiet on synced, loud on problems. */
.sync-pill{flex-shrink:0;display:flex;align-items:center;gap:5px;background:transparent;border:1px solid transparent;border-radius:14px;padding:5px 8px;color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;transition:background .12s,border-color .12s,color .12s;max-width:0;overflow:hidden;white-space:nowrap}
.sync-pill:active{background:var(--surface-3)}
.sp-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0}
.sp-text{display:none}
.sync-pill[data-state="synced"]{max-width:34px;padding:5px;color:var(--text-muted)}        /* quiet: dot only */
.sync-pill[data-state="syncing"]{max-width:200px;color:var(--accent);border-color:var(--border-subtle)}
.sync-pill[data-state="syncing"] .sp-dot{background:var(--accent);animation:livePulse 1.4s ease-in-out infinite}
.sync-pill[data-state="pending"]{max-width:200px;color:var(--warn);border-color:var(--warn)}
.sync-pill[data-state="pending"] .sp-dot{background:var(--warn)}
.sync-pill[data-state="offline"]{max-width:200px;color:var(--crit);border-color:var(--crit);background:color-mix(in srgb,var(--crit) 8%,transparent)}
.sync-pill[data-state="offline"] .sp-dot{background:var(--crit)}
.sync-pill:not([data-state="synced"]) .sp-text{display:inline}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}

/* ===== FILTER ROW (toggle + date) ===== */
.filter-row{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface-2);border-bottom:1px solid var(--border-subtle);flex-shrink:0;box-shadow:0 4px 12px rgba(20,30,25,.06)}
[data-theme="dark"] .filter-row{box-shadow:none}   /* dark: тіні невидимі — обʼєм через тон, не shadow */
.filter-row[hidden]{display:none}   /* b15 L4: інакше display:flex б'є атрибут [hidden] (рівна специфічність) → панель не ховалась на Паливі/Місяці */
.seg{display:flex;background:var(--surface-3);border-radius:var(--rs);padding:3px;gap:2px;flex:0 0 auto}
.seg-i{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--text-secondary);transition:background .14s,color .14s,box-shadow .14s;cursor:pointer;white-space:nowrap}
.seg-i svg{width:14px;height:14px;flex-shrink:0}
.seg-i.act{background:var(--surface-2);color:var(--accent);box-shadow:var(--sh1)}
[data-theme="dark"] .seg-i.act{background:var(--surface-4);color:var(--accent-text)}
.date-btn{margin-left:auto;display:flex;align-items:center;gap:6px;padding:7px 11px;background:var(--surface-3);border:1px solid var(--border-subtle);border-radius:var(--rs);font-size:12.5px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:background .12s;min-width:0}
.date-btn:active{background:var(--surface-4)}
.date-btn svg{width:14px;height:14px;color:var(--text-secondary);flex-shrink:0}
.date-btn .db-sub{color:var(--accent);font-weight:700}
/* Search row (Журнал) — тонкий, під filter-row */
.search-row{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--rs);flex-shrink:0;-webkit-user-select:none;user-select:none}
.search-row[hidden]{display:none}
.sr-ico{width:15px;height:15px;color:var(--text-muted);flex-shrink:0}
.sr-inp{flex:1;min-width:0;height:24px;border:none;outline:none;background:transparent;color:var(--text-primary);font-size:16px;font-weight:500;padding:0;-webkit-user-select:text;user-select:text}
.sr-inp::placeholder{color:var(--text-muted);font-weight:500}
.sr-inp::-webkit-search-cancel-button{display:none;-webkit-appearance:none}
.sr-clear{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface-3);color:var(--text-secondary);cursor:pointer}
.sr-clear[hidden]{display:none}
.sr-clear svg{width:13px;height:13px}
.sr-clear:active{background:var(--surface-4)}

/* ===== RANGE CALENDAR (batch11) ===== */
.cal-h{display:flex;align-items:center;justify-content:space-between;margin:0 2px 10px}
.cal-my{font-size:15px;font-weight:800;color:var(--text-primary)}
.cal-nav{display:flex;gap:6px}
.cal-nav button{width:34px;height:34px;border-radius:10px;background:var(--surface-3);border:1px solid var(--border-subtle);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer}
.cal-nav button:active{background:var(--surface-4)}
.cal-wd{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-wd span{text-align:center;font-size:11px;font-weight:700;color:var(--text-muted);padding:2px 0 6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:2px}
.cal-c{position:relative;height:42px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--text-primary);cursor:pointer;-webkit-user-select:none;user-select:none}
.cal-c.blank{visibility:hidden;cursor:default}
.cal-c.r0{background:var(--accent-soft)}
.cal-c.r1,.cal-c.r2,.cal-c.r3{background:var(--accent);color:#fff;font-weight:800}
.cal-c.r1{border-radius:21px 0 0 21px}
.cal-c.r2{border-radius:0 21px 21px 0}
.cal-c.r3{border-radius:21px}
.cal-c.today::after{content:"";position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-c.r1.today::after,.cal-c.r2.today::after,.cal-c.r3.today::after{background:#fff}
.cal-hint{font-size:11.5px;color:var(--text-muted);text-align:center;margin:10px 0 2px}
.cal-foot{display:flex;gap:8px;margin-top:10px}
.cal-reset{flex:0 0 auto;padding:13px 18px;border-radius:var(--r);background:var(--surface-3);border:1px solid var(--border-subtle);color:var(--text-secondary);font-size:14px;font-weight:700;cursor:pointer}
.cal-reset:active{background:var(--surface-4)}
.cal-apply{flex:1 1 auto;padding:13px;border-radius:var(--r);background:var(--accent);border:1px solid var(--accent);color:#fff;font-size:14px;font-weight:800;cursor:pointer}
.cal-apply:active{filter:brightness(.95)}

/* ===== SCREENS ===== */
.screens{flex:1 1 auto;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.scroll-a{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;padding:14px 14px calc(20px + var(--sab))}

/* ===== SUMMARY WIDGET 2x2 (concept v1.3 Розділ A) ===== */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sum-cell{position:relative;background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--r);padding:13px 14px;display:flex;flex-direction:column;gap:3px;cursor:pointer;box-shadow:var(--sh1),inset 0 1px 0 rgba(255,255,255,.04);transition:border-color .16s,background .16s,box-shadow .16s,transform .1s}
.sum-cell:active{background:var(--surface-3);transform:scale(.985)}
.sum-ico{position:absolute;top:11px;right:11px;width:26px;height:26px;padding:5px;box-sizing:border-box;border-radius:50%;background:var(--accent-soft);color:var(--accent-text);opacity:1}
.sum-val{font-size:21px;font-weight:800;letter-spacing:-.5px;color:var(--text-primary);line-height:1.05;transition:color .16s;font-variant-numeric:tabular-nums;padding-right:36px}
.sum-lbl{font-size:11.5px;font-weight:600;color:var(--text-muted)}
.sum-cell.accent{border-color:var(--border-accent)}
.sum-cell.accent .sum-val{color:var(--accent-text)}
.sum-cell.accent .sum-ico{color:var(--accent-text);opacity:1}
[data-theme="dark"] .sum-cell{border-color:var(--border-default)}
[data-theme="dark"] .sum-cell.accent{border-color:var(--accent-text)}/* Batch12: активний = ЛИШЕ кільце-рамка, без заливки — тинт за змістом дає фон, тож немає «колір на колір» */
/* Vibe-active: фільтр «Вайб» — seg-active + рамка smart-accent теплим */
body[data-filter="vibe"] .seg-i.act{color:var(--vibe-text)}
body[data-filter="vibe"] .sum-cell.accent{border-color:var(--vibe)}
body[data-filter="vibe"] .sum-cell.accent .sum-val,
body[data-filter="vibe"] .sum-cell.accent .sum-ico{color:var(--vibe-text)}
/* Batch12 тинт за змістом (Вісь-3): постійна тонка заливка за типом + іконки за типом */
.sum-grid .sum-cell[data-act="work"]{background:color-mix(in srgb,var(--accent) 8%,var(--surface-2))}
.sum-grid .sum-cell[data-act="vibe"]{background:color-mix(in srgb,var(--vibe) 11%,var(--surface-2))}
.sum-grid .sum-cell[data-act="fuel"]{background:color-mix(in srgb,var(--info) 9%,var(--surface-2))}
[data-theme="dark"] .sum-grid .sum-cell[data-act="fuel"]{background:color-mix(in srgb,var(--info) 14%,var(--surface-2))}/* 17.3: 11→14% — cool-на-cool зливався з зелено-сірим surface; виміряно lum-lift +15.4≈vibe, не кричить (A39). Світлу 9% не чіпаю */
.sum-cell[data-act="vibe"] .sum-ico{background:var(--vibe-soft);color:var(--vibe-text)}
.sum-cell[data-act="fuel"] .sum-ico{background:color-mix(in srgb,var(--info) 18%,var(--surface-2));color:var(--info)}
.sum-cell[data-act="month"] .sum-ico{background:var(--surface-3);color:var(--text-secondary)}
.sum-sub{font-size:11px;color:var(--text-muted);font-weight:500;font-variant-numeric:tabular-nums}

/* ===== CTA PAIR (concept v1.3 Розділ B — no "+" sign) ===== */
.cta-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.cta-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:transparent;border:1.5px solid var(--border-accent);border-radius:var(--r);color:var(--accent-text);font-size:14px;font-weight:700;cursor:pointer;transition:background .14s,transform .1s,color .14s}
.cta-btn svg{width:18px;height:18px;flex-shrink:0}
.cta-btn:active{background:var(--accent-soft);transform:scale(.975)}
/* 16d: Запис = нейтр. типо-агностична — форма як «Заправка», тон --neutral (перлина, A35); Заправка = синій secondary (паливо) */
/* 17.1: рамку приглушено до 45% — повний --neutral (dark #CDD5D1 near-white) кричав на pine; weight-match до мід-тонної рамки «Заправки». Заливка+текст лишаються */
.cta-rec{background:color-mix(in srgb,var(--neutral) 12%,var(--surface-2));border-color:color-mix(in srgb,var(--neutral) 45%,var(--surface-2));color:var(--neutral)}
.cta-rec:active{background:color-mix(in srgb,var(--neutral) 20%,var(--surface-2));transform:scale(.975)}
/* 17.2: рамку Заправки приглушено до 58% — баланс із приглушеною (17.1) рамкою «Запис»: дві рівні сестри, не «гучна+тиха». Токен-адаптивне: light #3E7C94→soft teal, dark #6B9BB8→muted blue. A35 (паливо=синій) збережено */
.cta-rf{background:color-mix(in srgb,var(--info) 10%,var(--surface-2));border-color:color-mix(in srgb,var(--info) 58%,var(--surface-2));color:var(--info)}
.cta-rf:active{background:color-mix(in srgb,var(--info) 18%,var(--surface-2));transform:scale(.975)}

/* ===== SECTION HEAD ===== */
.sec-h{display:flex;align-items:center;justify-content:space-between;margin:0 2px 9px}
.sec-t{font-size:13px;font-weight:800;color:var(--text-primary);letter-spacing:-.2px}
.sec-c{font-size:12px;font-weight:600;color:var(--text-muted)}
.sec-gap{margin-top:18px}

/* ===== RECORDS LIST (concept v1.3 Розділ E) ===== */
.rec{display:flex;gap:11px;background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--r);padding:12px 13px;margin-bottom:8px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .14s,background .14s}
/* Batch12 акцент-рейка (Вісь-3): тип одним поглядом */
.rec::before,.rf::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
.rec.work::before{background:var(--accent)}
.rec.vibe::before{background:var(--vibe)}
.rf::before{background:var(--info)}
.rec:active{background:var(--surface-3)}
.rec-num{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--accent);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.rec-num.vibe{border-color:var(--vibe);color:var(--vibe-text)}
.rec-mid{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:2px}
.rec-route{font-size:14px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-route .rt-time{color:var(--text-muted);font-weight:600;margin-right:6px}
.rec-addr{font-size:12px;color:var(--text-muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-chip{align-self:flex-start;margin-top:3px;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--surface-3);color:var(--text-secondary)}
.rec-chip.work{background:var(--accent-soft);color:var(--accent-text)}
.rec-chip.vibe{background:var(--vibe-soft);color:var(--vibe-text)}
.rec-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;flex-shrink:0;gap:2px}
.rec-km{font-size:15px;font-weight:800;color:var(--accent-text);letter-spacing:-.3px;margin-bottom:2px}
.rec-km.vibe{color:var(--vibe-text)}
.rec-km.rec-km-flag{font-size:11px;font-weight:700;color:var(--warn);letter-spacing:0;max-width:96px;text-align:right;line-height:1.15}/* B21: non-monotonic odo — тихе нагадування, no-red (amber=warn) */
.rec-fuel{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--text-secondary)}
.rec-fuel svg{width:11px;height:11px;color:color-mix(in srgb,var(--info) 62%,var(--text-muted))}
.rec-liters{font-size:10.5px;font-weight:600;color:var(--text-muted);font-variant-numeric:tabular-nums}

/* Compact refuel item (concept v1.3 Розділ C.2) */
.rf{display:flex;align-items:center;gap:11px;background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;position:relative;overflow:hidden;cursor:pointer;transition:background .14s}
.rf:active{background:var(--surface-3)}
.rf-ico{width:30px;height:30px;border-radius:50%;background:color-mix(in srgb,var(--info) 16%,var(--surface-2));color:var(--info);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rf-ico svg{width:16px;height:16px}
.rf-mid{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:2px}
.rf-t{font-size:13.5px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rf-t .rt-time{color:var(--text-muted);font-weight:600;margin-right:6px}
.rf-sub{font-size:12px;color:var(--text-muted);font-weight:500}
.rf-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.rf-vol{font-size:14px;font-weight:800;color:var(--accent-text)}
.rf-r svg{width:12px;height:12px;color:var(--text-muted)}

/* ===== SWIPE ROW + actions (Batch 10) — end-only snap ===== */
.sw-row{position:relative;margin-bottom:8px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border-subtle)}
.sw-row .rec,.sw-row .rf{margin-bottom:0;position:relative;z-index:1;border:none;transition:transform .2s cubic-bezier(.4,0,.2,1),border-radius .2s}
.sw-row.sw-open .rec,.sw-row.sw-open .rf{transform:translateX(-148px);border-top-right-radius:0;border-bottom-right-radius:0}
.sw-actions{position:absolute;top:0;right:0;bottom:0;display:flex;z-index:0;visibility:hidden;transition:visibility 0s linear .2s}
.sw-row.sw-open .sw-actions{visibility:visible;transition-delay:0s}
.sw-act{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;width:74px;color:#fff;font-size:11px;font-weight:700;letter-spacing:-.2px;cursor:pointer}
.sw-act svg{width:19px;height:19px}
.sw-act.edit{background:var(--accent)}
.sw-act.del{background:var(--crit)}
.sw-act:active{filter:brightness(.9)}
/* confirm (destructive) */
.cf-desc{font-size:13.5px;color:var(--text-secondary);line-height:1.5;margin:2px 2px 16px;font-weight:500}
.btn-danger{flex:1.3;padding:14px;background:var(--crit);border-radius:var(--r);font-size:14px;font-weight:800;color:#fff;cursor:pointer;transition:filter .12s,transform .1s}
.btn-danger:active{filter:brightness(.92);transform:scale(.985)}

/* ===== EMPTY STATE ===== */
.empty-state{padding:24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;min-height:48dvh}
.empty-ico{width:72px;height:72px;background:var(--surface-3);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.empty-ico svg{width:34px;height:34px}
.empty-txt{font-size:15px;font-weight:700;color:var(--text-secondary)}
.empty-hint{font-size:13px;color:var(--text-muted);line-height:1.55;max-width:260px}

/* ===== DEV-STATUS screen (tabs 2-4, honest status — not a stub) ===== */
.dev-state{padding:28px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:55dvh}
.dev-ico{width:76px;height:76px;background:var(--surface-3);border-radius:22px;display:flex;align-items:center;justify-content:center;color:var(--accent-text)}
.dev-ico svg{width:36px;height:36px}
.dev-badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:12px;background:var(--accent-soft);color:var(--accent-text)}
.dev-txt{font-size:16px;font-weight:800;color:var(--text-primary)}
.dev-hint{font-size:13.5px;color:var(--text-secondary);line-height:1.6;max-width:280px}

/* ===== JOURNAL (Tab 2, concept v1.3 §3.1) ===== */
.jsum{display:flex;align-items:baseline;justify-content:space-between;gap:10px;background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--r);padding:12px 14px;margin-bottom:6px}
/* Pinned journal stats bar (chrome, завжди видно) */
.jstats-bar{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:7px 14px;background:var(--surface-1);border-bottom:1px solid var(--border-subtle);flex-shrink:0;box-shadow:0 4px 12px rgba(20,30,25,.06)}
[data-theme="dark"] .jstats-bar{background:var(--surface-3);box-shadow:none}   /* dark: тон-страйп (s3>s1 void), лише faint border-subtle — без хайлайту/товстого бордера */
.jstats-bar[hidden]{display:none}
#jr-controls{flex-shrink:0}
#jr-list{padding-top:4px}
.jb-drop{display:inline-flex;align-items:center;color:var(--info)}
.jb-drop svg{width:12px;height:12px;display:block}
.jsum-l{font-size:13px;font-weight:700;color:var(--text-primary);min-width:0}
.jsum-l b{color:var(--accent-text)}
.jsum-r{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--text-secondary);white-space:nowrap;flex-shrink:0}
.jb-i{display:inline-flex;align-items:center;gap:4px}
.jb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.jb-dot.work{background:var(--accent)}
.jb-dot.vibe{background:var(--vibe)}
.jb-dot.fuel{background:var(--info)}
.jb-sep{color:var(--text-muted);font-style:normal;opacity:.6}
.jm-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:18px 2px 9px}
.jm-t{font-size:13px;font-weight:800;color:var(--text-primary);letter-spacing:-.2px}
.jm-km{font-size:12px;font-weight:700;color:var(--text-muted);white-space:nowrap}
.jw-div{height:1px;background:var(--border-subtle);margin:9px 10px;opacity:.7}
.jd{background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .14s}
.jd.active{border-color:var(--border-accent)}
.jd-head{display:flex;align-items:center;gap:12px;padding:11px 13px;cursor:pointer;transition:background .14s}
.jd-head:active{background:var(--surface-3)}
.jd-cal{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.jd-day{width:34px;height:34px;border-radius:10px;background:var(--surface-3);color:var(--text-primary);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;line-height:1}
.jd.active .jd-day{background:var(--accent);color:#fff}
.jd-wd{font-size:9.5px;font-weight:700;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.jd-mid{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:3px}
.jd-rel{font-size:14px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jd-counts{font-size:12px;font-weight:500;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jd-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.jd-km{font-size:15px;font-weight:800;color:var(--accent-text);letter-spacing:-.3px}
.jd-km.zero{color:var(--text-muted)}
.jd-fuel{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--text-secondary)}
.jd-fuel svg{width:11px;height:11px;color:color-mix(in srgb,var(--info) 62%,var(--text-muted))}
.jd-liters{font-size:10px;font-weight:600;color:var(--text-muted);font-variant-numeric:tabular-nums}
.jd-chev{color:var(--text-muted);flex-shrink:0;transition:transform .18s}
.jd.exp .jd-chev{transform:rotate(90deg)}
.jd-exp{padding:0 13px 13px;border-top:1px solid var(--border-subtle)}
.jd-exp .sec-h{margin:11px 2px 8px}
.jd-exp .rec,.jd-exp .rf{background:var(--surface-1);box-shadow:0 1px 3px rgba(20,30,25,.05)}
.jd-exp .rec:active,.jd-exp .rf:active{background:var(--surface-3)}
[data-theme="dark"] .jd-exp .rec,[data-theme="dark"] .jd-exp .rf{background:var(--surface-3);box-shadow:none}
[data-theme="dark"] .jd-exp .rec:active,[data-theme="dark"] .jd-exp .rf:active{background:var(--surface-4)}
.jd-empty{font-size:12.5px;color:var(--text-muted);padding:12px 2px 4px;font-weight:500;text-align:center}
.jd-open{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;padding:11px;background:var(--surface-3);border:1px solid var(--border-subtle);border-radius:var(--rs);color:var(--accent-text);font-size:13px;font-weight:700;cursor:pointer;transition:background .12s}
.jd-open:active{background:var(--accent-soft)}
.jd-open svg{width:15px;height:15px;flex-shrink:0}

/* ===== BOTTOM NAV (concept v1.2 §14.13 — 3-state padding) ===== */
.bottom-nav{display:flex;background:var(--surface-2);border-top:1px solid var(--border-subtle);flex-shrink:0;padding-bottom:8px}
@media(display-mode:standalone){.bottom-nav{padding-bottom:0}}
html.pwa-full .nav-i{padding-top:8px;padding-bottom:calc(8px + var(--sab))}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border-radius:12px;color:var(--text-muted);font-size:10px;font-weight:600;transition:color .15s,background .15s;cursor:pointer}
.nav-i:active{background:var(--surface-3)}
.nav-i svg{width:22px;height:22px;transition:stroke .15s}
.nav-i.act{color:var(--accent)}
[data-theme="dark"] .nav-i.act{color:var(--accent-text)}

/* ===== BOTTOM SHEETS (concept v1.2 §14.15) ===== */
.sh-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;visibility:hidden;opacity:0;pointer-events:none;transition:opacity .24s ease,visibility 0s linear .26s}
.sh-bg.open{visibility:visible;opacity:1;pointer-events:auto;transition:opacity .24s ease,visibility 0s}
.sh-box{background:var(--surface-2);border-radius:18px 18px 0 0;width:100%;max-width:430px;margin:0 auto;max-height:88dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 24px rgba(0,0,0,.18);transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1)}
.sh-bg.open .sh-box{transform:translateY(0)}
@media (prefers-reduced-motion:reduce){.sh-bg,.sh-box{transition:none}}
.sh-grip-w{padding:10px 0 4px;display:flex;justify-content:center;cursor:grab;flex-shrink:0}
.sh-grip{width:38px;height:4px;background:var(--border-default);border-radius:2px}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:4px 18px 12px;border-bottom:1px solid var(--border-subtle)}
.sh-title{font-size:17px;font-weight:800;color:var(--text-primary);letter-spacing:-.3px}
.sh-x{width:30px;height:30px;border-radius:50%;background:var(--surface-3);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;cursor:pointer;flex-shrink:0;transition:background .12s}
.sh-x:active{background:var(--surface-4)}
.sh-body{padding:14px 18px 18px}

/* Action menu list */
.menu-i{display:flex;align-items:center;gap:13px;width:100%;padding:13px 6px;border-radius:var(--rs);text-align:left;color:var(--text-primary);font-size:15px;font-weight:600;cursor:pointer;transition:background .12s}
.menu-i:active{background:var(--surface-3)}
.menu-i .mi-ico{width:34px;height:34px;border-radius:9px;background:var(--surface-3);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-i .mi-ico svg{width:18px;height:18px}
.menu-i .mi-label{flex:1}
.menu-i .mi-chev{color:var(--text-muted);flex-shrink:0}
.menu-i:disabled{cursor:not-allowed;opacity:1}
.menu-i:disabled .mi-label{color:var(--text-muted)}
.menu-i:disabled .mi-ico{color:var(--text-muted);opacity:.6}
.menu-i .mi-note{display:block;font-size:11px;font-weight:500;color:var(--text-muted);margin-top:2px}
.menu-sep{height:1px;background:var(--border-subtle);margin:6px 6px}

/* Form fields */
.fld{margin-bottom:13px}
.fld-row{display:flex;gap:10px}
.fld-row .fld{flex:1;min-width:0;margin-bottom:13px}
.fld-row .fld .inp{width:100%;min-width:0}
.fld-row.is-hidden{display:none}/* B21.1: спец.(0,2,0)>.fld-row(0,1,0) — без !important; НЕ [hidden] (його перебиває display:flex) */
.fld-l{display:block;font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:6px}
.inp{width:100%;background:var(--surface-3);border:1px solid var(--border-subtle);border-radius:var(--rs);padding:12px 13px;color:var(--text-primary);font-weight:600;transition:border-color .14s,background .14s}
.inp:focus{outline:none;border-color:var(--border-accent);background:var(--surface-2)}
.inp.invalid{border-color:var(--crit)}
input[type=time].inp{width:auto;min-width:120px}/* F14: не тягнути Час на всю ширину */
/* B19.1 #1 — Variant A (device-обрано через compare, wsd 2.4): Дата+Час обидва по контенту, ліво-пак. Скоуп :has() лише на рядок з часом — інші fld-row (text+text) цілі 50/50 */
.fld-row .fld:has(input[type=time]){flex:0 0 auto}/* Час: по контенту */
.fld-row:has(input[type=time]) .fld:has(input[type=date]){flex:0 1 auto}/* Дата: по контенту, може стиснутись (анти-overflow); НЕ flex:1 — розтяг давав float значення */
.fld-row:has(input[type=time]) .fld:has(input[type=date]) .inp{width:auto;max-width:100%}/* native date: контентна ширина, не 100%. Спец.(0,5,2)>бази(0,3,0) */
/* 17 (Batch A): перемикач типу у шіті «Запис» — форма як верхній сегмент, колір за A35 (work=accent, vibe=vibe) */
.type-seg{display:flex;background:var(--surface-3);border-radius:var(--rs);padding:3px;gap:2px}
.type-seg .ty-i{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:8px;font-size:13.5px;font-weight:700;color:var(--text-secondary);transition:background .14s,color .14s,box-shadow .14s;cursor:pointer}
.type-seg .ty-i svg{width:16px;height:16px;flex-shrink:0}
/* 17.1: світла активна пігулка — soft-тинт за типом (біла на сірому track була слабка); текст --*-text для контрасту на soft. Темну НЕ чіпаю (нижче, surface-4) */
.type-seg .ty-i.act[data-ty="work"]{background:var(--accent-soft);color:var(--accent-text);box-shadow:var(--sh1)}
.type-seg .ty-i.act[data-ty="vibe"]{background:var(--vibe-soft);color:var(--vibe-text);box-shadow:var(--sh1)}
[data-theme="dark"] .type-seg .ty-i.act[data-ty="work"]{background:var(--surface-4);color:var(--accent-text)}
[data-theme="dark"] .type-seg .ty-i.act[data-ty="vibe"]{background:var(--surface-4);color:var(--vibe-text)}
textarea.inp{resize:none;line-height:1.5}
select.inp{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238A968F' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:34px}
.fld-cc{display:flex;gap:8px;align-items:center}
.fld-cc .chip-btn{padding:10px 13px;align-self:center}
.chip-btn{padding:11px 13px;background:var(--surface-3);border:1px solid var(--border-subtle);border-radius:var(--rs);font-size:13px;font-weight:700;color:var(--text-secondary);white-space:nowrap;cursor:pointer;transition:background .12s,color .12s}
.chip-btn:active{background:var(--accent-soft);color:var(--accent-text)}
.char-c{font-size:11px;color:var(--text-muted);text-align:right;margin-top:4px;font-weight:600}

/* Спільний тап-селект .pk (Batch 9.1 — заміна нативного select: без jank, керований фокус). Переюз: АЗС + Тип палива */
.pk{position:relative}
.pk-btn{display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;gap:8px;cursor:pointer;font-size:16px}
.pk-btn .pk-chev{width:14px;height:14px;color:var(--text-muted);flex-shrink:0;transition:transform .15s}
.pk.open .pk-chev{transform:rotate(180deg)}
.pk-list{margin-top:6px;background:var(--surface-2);border:1px solid var(--border-default);border-radius:var(--rs);max-height:232px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pk-opt{display:block;width:100%;text-align:left;padding:12px 13px;background:transparent;border:none;border-bottom:1px solid var(--border-subtle);color:var(--text-primary);font-size:15px;font-weight:600;cursor:pointer}
.pk-opt:last-child{border-bottom:none}
.pk-opt:active{background:var(--surface-3)}
.pk-opt.sel{color:var(--accent-text)}
.pk-opt.other{color:var(--text-secondary);font-style:italic}

/* Fuel selector (concept v1.3 Розділ D — 12 cells, 4 groups) */
.fuel-sel{margin:2px 0 4px}
.fg-wrap{display:flex;align-items:center;gap:9px}
.fg-end{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;width:16px;font-size:10px;font-weight:800;color:var(--text-muted)}
.fg-end .fg-drop{width:12px;height:12px}
.fg-end-e .fg-drop{color:var(--text-muted);opacity:.55}
.fg-end-f .fg-drop-full{color:var(--info)}
.fg-lbl{line-height:1}
.fg-grid{flex:1;display:flex;gap:5px;touch-action:none;user-select:none;-webkit-user-select:none;padding:7px 8px;background:var(--surface-1);border:1px solid var(--border-subtle);border-radius:9px;box-shadow:inset 0 1px 3px rgba(0,0,0,.10)}
.fg-group{display:flex;gap:5px;flex:1}
.fg-group + .fg-group{margin-left:7px}
.fg-cell{flex:1;height:32px;min-width:12px;border-radius:5px;background:var(--surface-3);border:1px solid var(--border-subtle);transition:background .1s,transform .1s,border-color .1s,box-shadow .1s;cursor:pointer}
.fg-cell.on{background:var(--info);border-color:var(--info);box-shadow:0 1px 4px color-mix(in srgb,var(--info) 40%,transparent)}
.fg-cell.pulse{transform:scaleY(1.14)}
/* Batch 9.2: Dark — підняти контейнер НАД аркушем (запас яскравості лише вгору). Панель=surface-3, порожні сегменти=surface-2 (вглиб) */
[data-theme="dark"] .fg-grid{background:var(--surface-3);border-color:var(--border-default);box-shadow:0 1px 2px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.05)}
[data-theme="dark"] .fg-cell{background:color-mix(in srgb,var(--info) 6%,var(--surface-2))}/* 9.5: шепіт зеленого, нейтральніше (Light empty теж майже нейтральні) */
[data-theme="dark"] .fg-cell.on{background:linear-gradient(180deg,color-mix(in srgb,var(--info) 78%,#fff) 0%,var(--info) 100%);border-color:var(--info);box-shadow:none}/* 9.6: субтильний градієнт зверху-вниз = об'єм LED-поділки (тіні на dark невидимі) */
.fg-val{margin-top:10px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--text-secondary);font-variant-numeric:tabular-nums}
.fg-val svg{width:14px;height:14px;color:var(--info);flex-shrink:0}
.fg-val b{color:var(--info);font-weight:800}

/* Form footer — parallel actions (concept v1.3 Розділ F) */
.sh-foot{display:flex;gap:10px;margin-top:6px}
.btn-sec{flex:1;padding:14px;background:var(--surface-3);border:1px solid var(--border-subtle);border-radius:var(--r);font-size:14px;font-weight:700;color:var(--text-secondary);cursor:pointer;transition:background .12s}
.btn-sec:active{background:var(--surface-4)}
.btn-pri{flex:1.3;padding:14px;background:var(--accent);border-radius:var(--r);font-size:14px;font-weight:800;color:#fff;cursor:pointer;transition:background .12s,transform .1s}
.btn-pri:active{background:var(--accent-active,#2E7355);transform:scale(.985)}

/* FAQ / About / Settings rows */
.faq-i{padding:12px 2px;border-bottom:1px solid var(--border-subtle)}
.faq-i:last-child{border-bottom:none}
.faq-q{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:4px}
.faq-a{font-size:13px;color:var(--text-secondary);line-height:1.55}
.set-i{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 2px;border-bottom:1px solid var(--border-subtle)}
.set-i:last-child{border-bottom:none}
.set-l{font-size:14px;font-weight:600;color:var(--text-primary)}
.set-d{font-size:12px;color:var(--text-muted);margin-top:2px}
.set-i select.inp{width:auto;padding:8px 30px 8px 11px;flex-shrink:0}
.sw{position:relative;width:46px;height:28px;flex-shrink:0;cursor:pointer}
.sw input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
.sw-tr{position:absolute;inset:0;background:var(--surface-4);border-radius:14px;transition:background .18s}
.sw-tr::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sw input:checked + .sw-tr{background:var(--accent)}
.sw input:checked + .sw-tr::after{transform:translateX(18px)}
.about-row{display:flex;justify-content:space-between;padding:11px 2px;border-bottom:1px solid var(--border-subtle);font-size:14px}
.about-row:last-child{border-bottom:none}
.about-row .ar-k{color:var(--text-muted);font-weight:600}
.about-row .ar-v{color:var(--text-primary);font-weight:700}
.about-row a.ar-v{color:var(--accent-text);text-decoration:none}
.note-banner{display:flex;gap:9px;padding:11px 12px;background:var(--accent-soft);border-radius:var(--rs);font-size:12.5px;color:var(--accent-text);font-weight:600;line-height:1.5;margin-bottom:14px}
.note-banner svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}

/* Toast */
.toast{position:fixed;left:50%;bottom:calc(78px + var(--sab));transform:translateX(-50%) translateY(20px);background:var(--text-primary);color:var(--surface-1);padding:11px 18px;border-radius:22px;font-size:13px;font-weight:700;z-index:400;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;box-shadow:var(--sh2);max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Orientation lock (concept v1.2 §14.19) ===== */
@media (orientation:landscape) and (max-width:900px){
  #app{display:none!important}
  body::after{content:"Поверніть телефон вертикально";position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:var(--surface-1);color:var(--text-primary);font-size:17px;font-weight:600;text-align:center;padding:32px;line-height:1.4}
}
/* ===== Tab 3 Паливо (Batch 13) ===== */
.fl-seg{margin-bottom:14px}
.fl-seg .seg-i{flex:1;justify-content:center}
.fl-card{background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--sh1),inset 0 1px 0 rgba(255,255,255,.04)}
[data-theme="dark"] .fl-card{border-color:var(--border-default)}
.fl-note{font-size:13px;color:var(--text-muted);line-height:1.55}
.fl-cta{margin-top:2px;padding:11px 18px;background:var(--accent);color:#fff;border-radius:var(--rs);font-size:13.5px;font-weight:800;cursor:pointer;transition:transform .1s,background .12s}
.fl-cta:active{transform:scale(.97);background:var(--accent-text)}
/* Fuel state bar (R1) — read-only echo of form gauge */
.fl-state{background:color-mix(in srgb,var(--info) 10%,var(--surface-2));border-color:color-mix(in srgb,var(--info) 35%,var(--border-subtle))}/* b16b B2/S3: головна картка — помітний паливний тинт + рамка */
[data-theme="dark"] .fl-state{background:color-mix(in srgb,var(--info) 16%,var(--surface-2));border-color:color-mix(in srgb,var(--info) 42%,var(--border-default))}/* b16b B2: відрізнити від нейтральних карток на темній */
/* b16a D1: low більше НЕ червоний — лише текстова підказка (fs-warn). Низьке паливо = життя, не помилка */
.fs-top{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:11px}
.fs-liters{display:flex;align-items:center;gap:9px}
.fs-chip{flex-shrink:0;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:color-mix(in srgb,var(--info) 24%,var(--surface-2))}/* b16c: чип-кружечок як Hero — контрастний фон, щоб крапля не тонула в паливному тинті картки */
.fs-drop{width:15px;height:15px;color:var(--info);flex-shrink:0}
.fs-num{font-size:28px;font-weight:800;letter-spacing:-.5px;color:var(--text-primary);line-height:1;font-variant-numeric:tabular-nums}
.fs-approx{font-size:17px;font-weight:700;color:var(--text-secondary)}/* b16c: ≈ кваліфікатор, не конкурує з числом */
.fs-unit{font-size:14px;font-weight:700;color:var(--text-secondary)}
.fs-meta{font-size:12px;font-weight:600;color:var(--text-secondary);font-variant-numeric:tabular-nums;text-align:right;line-height:1.4}/* b16c: muted тонув на паливному тинті — піднято до secondary */
.fs-bar{display:flex;align-items:center;gap:9px;pointer-events:none}
.fs-end{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;width:15px;font-size:10px;font-weight:800;color:var(--text-muted)}
.fs-edrop{width:11px;height:11px}
.fs-end-e .fs-edrop{color:var(--text-secondary);opacity:.85}/* b16b TH6: E-маркер видимий на темній */
.fs-end-f .fs-edrop{color:var(--info)}
.fs-grid{flex:1;display:flex;gap:5px}
.fs-group{display:flex;gap:5px;flex:1}
.fs-group + .fs-group{margin-left:6px}
.fs-cell{flex:1;height:13px;min-width:10px;border-radius:3px;background:var(--surface-4);border:1px solid var(--border-subtle)}/* b16b S4: пласкіше, менш «кнопкове» */
[data-theme="dark"] .fs-cell:not(.on){background:var(--surface-4);border-color:var(--border-default)}/* b16b TH1: видимий трек порожніх на темній */
.fs-cell.on{background:var(--info);border-color:var(--info)}
/* b16c: поділки-риски ділень під баром (без дробів — лічба поділок, не математика); дзеркалить структуру grid */
.fs-scale{display:flex;align-items:flex-start;gap:9px;margin-top:5px;pointer-events:none}
.fs-end-sp{flex-shrink:0;width:15px}
.fs-sgrid{flex:1;display:flex;gap:5px}
.fs-sg{flex:1;display:flex;justify-content:flex-end;position:relative}
.fs-sg + .fs-sg{margin-left:6px}
.fs-tick{display:block;width:2px;height:6px;border-radius:1px;background:var(--text-muted);transform:translateX(calc(50% + 5.5px))}/* риска в центрі 11px-щілини (gap5+margin6) — авто-вирівняна під межі груп */
.fs-tick.half{height:9px;background:var(--text-secondary)}/* середина бака — природний якір, без гліфа ½ */
/* 17 (рідер, гейдж-мікро з 16c device-тесту): на темній поділки/обідок чипа бліді (тинт-різниця ~8%) — підсилюємо ЛИШЕ для dark */
[data-theme="dark"] .fs-tick{background:var(--text-secondary)}
[data-theme="dark"] .fs-tick.half{background:var(--text-primary)}
[data-theme="dark"] .fs-chip{background:color-mix(in srgb,var(--info) 34%,var(--surface-2));border:1px solid color-mix(in srgb,var(--info) 42%,var(--surface-2))}
.fs-warn{margin-top:9px;font-size:12.5px;font-weight:700;color:var(--info)}/* b16a D1: підказка, не тривога */
/* Card hierarchy — lite reference sections (Гроші / Заправки) */
/* b16a2: fl-lite прибрано — усе уніфіковано в fl-card (плаский lite поряд з картками = крінж на device) */
/* Consumption */
.fc-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.fc-val{font-size:26px;font-weight:800;letter-spacing:-.5px;color:var(--text-primary);line-height:1;font-variant-numeric:tabular-nums}
.fc-val span{font-size:13px;font-weight:700;color:var(--text-secondary)}
.fc-lbl{margin-top:5px;font-size:12px;font-weight:600;color:var(--text-secondary)}/* b16b B3: читабельніше (несе дельту) */
.fc-trend{font-weight:800;font-variant-numeric:tabular-nums;color:var(--text-secondary)}/* b16a D1: напрям несе стрілка, не колір — без crit/ok */
.fl-skip{margin-top:9px;font-size:11.5px;color:var(--text-muted)}
/* b16a D2: .spark + sparkline() лишено як примітив під відкладений Tab-1 hero (C2). Tab-3 виклики прибрано */
.spark{width:88px;height:30px;display:block}
/* Split bar */
.split-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;background:var(--surface-4);margin-bottom:11px}
.split-w{background:var(--accent)}.split-v{background:var(--vibe)}.split-u{background:color-mix(in srgb,var(--text-muted) 55%,var(--surface-4))}
.split-leg{display:grid;grid-template-columns:auto auto 1fr;gap:7px 8px;align-items:center;font-size:12.5px}/* b16c: грид → підписи авто-вирівняні до найширшого, значення стартують з однієї вертикалі */
.split-li{display:contents}
.sl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sl-dot.work{background:var(--accent)}.sl-dot.vibe{background:var(--vibe)}.sl-dot.unlog{background:color-mix(in srgb,var(--text-muted) 55%,var(--surface-4))}
.sl-k{font-weight:700;color:var(--text-secondary)}
.sl-v{color:var(--text-secondary);font-weight:600;font-variant-numeric:tabular-nums}/* b16b B3: не примарний */
/* Money + pattern rows */
.fm-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--border-subtle)}
.fm-row:last-child{border-bottom:none}
.fm-k{font-size:13px;font-weight:600;color:var(--text-secondary)}
.fm-v{font-size:14px;font-weight:800;color:var(--text-primary);font-variant-numeric:tabular-nums;text-align:right}
/* b16a2: острівець fp-stations прибрано — секція «Заправки» вже картка; підсекція = заголовок+список */
.fp-sub{margin:12px 0 7px;font-size:12px;font-weight:700;color:var(--text-primary)}/* b16a A3: заголовок підсекції яскравий, без капсів */
.fp-st{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-subtle)}
.fp-st:last-of-type{border-bottom:none}
.fp-st-n{flex:1;font-size:13px;font-weight:600;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}/* b16a A3: назва АЗС приглушена */
.fp-st-c{font-size:12px;font-weight:700;color:var(--text-muted);font-variant-numeric:tabular-nums}
.fp-st-p{font-size:13px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums;min-width:66px;text-align:right}/* b16a A3+R4: ціна = головне число */

/* ========================================================================
   TAB-4 «МІСЯЦЬ» (Batch 22) — банер A1 + перемикач + гантелі + ритм B3
   Cookbook A42 (скрим), A43 (layered SVG-фон), A39 (обидві теми)
   ======================================================================== */

/* --- сезонні токени банера (A43): light незмінні, dark усі 4 підняті над фоном --- */
.forest{--sky-a:#DCEFE6;--sky-b:#F1F8F4;--far:#AAC9BC;--mid:#6FA68C;--near:#3E6B54;--fog:rgba(255,255,255,.55);--snow:transparent;--bird:#5C7A6C}
html[data-season="autumn"] .forest{--sky-a:#F5ECD8;--sky-b:#FBF6EC;--far:#DAC8A6;--mid:#C49A5C;--near:#8A5A2B;--fog:rgba(255,255,255,.58);--snow:transparent;--bird:#9C7430}
html[data-season="winter"] .forest{--sky-a:#E6EDF2;--sky-b:#F8FBFC;--far:#C3CED7;--mid:#9FB1BD;--near:#6E8493;--fog:rgba(255,255,255,.62);--snow:#FFFFFF;--bird:#7E8E99}
html[data-season="spring"] .forest{--sky-a:#E4F1E7;--sky-b:#F5FBF6;--far:#B7D3BD;--mid:#82B98E;--near:#4E8C5E;--fog:rgba(255,255,255,.52);--snow:transparent;--bird:#5E9A6A}
/* dark — усі 4 сезони підняті (sky-b ≠ #0E1311, інакше низ банера тоне у фон) */
html[data-theme="dark"] .forest{--sky-a:#1C2D26;--sky-b:#12201A;--far:#37574B;--mid:#2C4D40;--near:#1E4034;--fog:rgba(160,195,178,.18);--snow:transparent;--bird:#6E8C7E}
html[data-theme="dark"][data-season="autumn"] .forest{--sky-a:#231C12;--sky-b:#1A1409;--far:#4A3B28;--mid:#5E4A2A;--near:#3A2A18;--fog:rgba(190,170,140,.15);--snow:transparent;--bird:#8A6A38}
html[data-theme="dark"][data-season="winter"] .forest{--sky-a:#141C22;--sky-b:#10161B;--far:#2A343C;--mid:#36444E;--near:#44555E;--fog:rgba(170,190,205,.16);--snow:rgba(224,234,240,.9);--bird:#7E8E99}
html[data-theme="dark"][data-season="spring"] .forest{--sky-a:#1E2E1F;--sky-b:#13211A;--far:#3E6A50;--mid:#2D5740;--near:#1F4A35;--fog:rgba(160,200,170,.18);--snow:transparent;--bird:#6FA877}

/* --- перемикач місяця (перший у скролі, не pinned) --- */
.mo-sw{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.mo-arrow{flex-shrink:0;width:40px;height:40px;border-radius:var(--rs);background:var(--surface-2);border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);box-shadow:var(--sh1);cursor:pointer;transition:background .12s,opacity .12s}
.mo-arrow:active{background:var(--surface-3)}
.mo-arrow svg{width:18px;height:18px}
.mo-arrow.off{opacity:.34;pointer-events:none}
.mo-lbl{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;height:40px;border-radius:var(--rs);background:var(--surface-2);border:1px solid var(--border-subtle);box-shadow:var(--sh1);font-size:14.5px;font-weight:800;letter-spacing:-.2px;color:var(--text-primary)}
.mo-lbl svg{width:16px;height:16px;color:var(--text-secondary);flex-shrink:0}

/* --- банер A1 (декор-виняток) --- */
.banner{position:relative;border-radius:var(--r);overflow:hidden;background:var(--surface-2);box-shadow:var(--sh1);border:1px solid var(--border-default);margin-bottom:14px}
.banner svg.scene{display:block;width:100%;height:auto}
.b-txt{position:absolute;inset:0;padding:16px 18px;display:flex;flex-direction:column;justify-content:flex-start;pointer-events:none}
.b-txt::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,var(--scrim-1) 0%,var(--scrim-2) 40%,transparent 70%);pointer-events:none}/* A42 токен-скрим */
.b-txt>*{position:relative}
.b-h{font-size:21px;font-weight:800;letter-spacing:-.4px;line-height:1.1;color:var(--text-primary)}
.b-h .km{color:var(--accent)}
[data-theme="dark"] .b-h .km{color:#52B788}
.b-syn{margin-top:8px;font-size:12.5px;font-weight:600;color:var(--text-secondary);max-width:64%;line-height:1.4}
.b-grey{margin-top:5px;font-size:11.5px;font-weight:600;color:var(--text-muted);max-width:64%}

/* --- картка-контейнер гантелей/ритму --- */
.mo-card{background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--r);box-shadow:var(--sh1),inset 0 1px 0 rgba(255,255,255,.04);padding:15px 14px 13px;margin-bottom:14px}

/* --- гантелі (сигнатурний візуал) --- */
.dmb{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border-subtle)}
.dmb:first-of-type{padding-top:2px}
.dmb:last-of-type{border-bottom:none;padding-bottom:2px}
.dmb.muted{opacity:.5}
.dmb-ico{flex-shrink:0;width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent-text)}
.dmb-ico svg{width:21px;height:21px}
.dmb-ico.fuel{background:color-mix(in srgb,var(--info) 14%,var(--surface-2));color:var(--info)}/* A39: token-adaptive, звірити обидві теми */
.dmb-body{flex:1;min-width:0}
.dmb-name{font-size:11.5px;font-weight:700;color:var(--text-secondary);margin-bottom:5px}
.dmb-bar{display:flex;align-items:center;gap:9px}
.dmb-end{flex-shrink:0}
.dmb-end.prev{text-align:right}
.dmb-v{font-size:16px;font-weight:800;letter-spacing:-.3px;color:var(--text-primary);line-height:1.05;font-variant-numeric:tabular-nums}
.dmb-v span{font-size:10.5px;font-weight:700;color:var(--text-secondary)}
.dmb-end.prev .dmb-v{color:var(--text-secondary)}
.dmb-when{font-size:10px;font-weight:600;color:var(--text-muted);margin-top:2px}
.dmb-conn{flex:1;display:flex;align-items:center;min-width:24px}
.dmb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dmb-dot.cur{background:var(--accent)}
[data-theme="dark"] .dmb-dot.cur{background:#52B788}
.dmb-dot.prev{background:color-mix(in srgb,var(--text-muted) 60%,var(--surface-4))}
.dmb-line{flex:1;height:2px;border-radius:1px;background:var(--border-default)}
.dmb-delta{flex-shrink:0;text-align:right;min-width:48px;color:var(--accent-text)}/* зелений = «змінилось», напрям несе стрілка; червоного нема */
.dmb-delta.flat{color:var(--text-muted)}
.dmb-pct{font-size:14px;font-weight:800;letter-spacing:-.3px;font-variant-numeric:tabular-nums;line-height:1.05}
.dmb-arrow{font-size:12px;font-weight:800;line-height:1}
.dmb-abs{font-size:10.5px;font-weight:600;color:var(--text-muted);margin-top:1px;font-variant-numeric:tabular-nums}
.dmb-dash{font-size:16px;font-weight:800;color:var(--text-muted)}
.dmb-why{font-size:10px;font-weight:600;color:var(--text-muted);margin-top:3px;line-height:1.3}
.dmb-leg{display:flex;justify-content:center;gap:16px;margin-top:11px;font-size:11px;font-weight:600;color:var(--text-secondary)}
.dmb-leg span{display:inline-flex;align-items:center;gap:6px}
.dmb-leg i{width:8px;height:8px;border-radius:50%}
.dmb-leg i.prev{background:color-mix(in srgb,var(--text-muted) 60%,var(--surface-4))}
.dmb-leg i.cur{background:var(--accent)}
[data-theme="dark"] .dmb-leg i.cur{background:#52B788}

/* --- ритм місяця (B3 тональний) --- */
.r-h{font-size:14px;font-weight:800;color:var(--text-primary);margin-bottom:14px}
.r-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
.r-cell{display:flex;flex-direction:column;align-items:center;gap:7px}
.disc{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.disc svg{width:24px;height:24px}
.disc.active{background:var(--accent-soft);color:var(--accent-text)}
.disc.neu{background:var(--surface-3);color:var(--text-secondary);border:1px solid var(--border-default)}/* пауза+середній: нейтрал, різняться силуетом не кольором */
[data-theme="dark"] .disc.neu{background:var(--surface-4)}
.r-lbl{font-size:11px;font-weight:600;color:var(--text-secondary);line-height:1.25;min-height:26px}
.r-val{font-size:17px;font-weight:800;letter-spacing:-.4px;color:var(--text-primary);font-variant-numeric:tabular-nums}
.r-val.active{color:var(--accent-text)}
.r-sub{font-size:11px;font-weight:600;color:var(--text-muted);margin-top:-3px}
.r-foot{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:15px;padding-top:13px;border-top:1px solid var(--border-subtle);font-size:12px;font-weight:600;color:var(--text-secondary)}
.r-foot svg{width:14px;height:14px;color:var(--accent);flex-shrink:0}
.r-foot b{color:var(--accent-text);font-weight:800}

/* --- Tab-4 шапка: сегмент full-width, дата прибрана (концепт §3) --- */
body[data-tab="month"] .filter-row .seg{flex:1 1 auto;width:100%}
body[data-tab="month"] .filter-row .seg-i{flex:1;justify-content:center}
body[data-tab="month"] .date-btn{display:none}/* A36-aware: (0,2,0) > .date-btn (0,1,0) */
</style>
</head>
<body>
<div id="app">
  <!-- ===== APP BAR ===== -->
  <header class="app-bar">
    <div class="bar-top">
      <div class="brand">Drive<em>·</em>Lens</div>
      <button class="av-pill" id="avBtn" aria-haspopup="true" aria-label="Меню профілю">
        <span class="avatar" id="avInit">K</span>
        <span class="av-nm" id="avNm">Konstantinov A.</span>
        <svg class="chev-ico" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="theme-wrap">
        <button class="icon-btn" id="btnTheme" aria-label="Тема" aria-haspopup="true" aria-expanded="false">
          <svg class="th-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <g class="th-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></g>
            <g class="th-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></g>
          </svg>
        </button>
        <div class="theme-menu" id="themeMenu" role="menu" hidden>
          <button class="theme-item" data-mode="light" role="menuitemradio">
            <svg class="ti-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            <span class="ti-label">Світла</span>
            <svg class="ti-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="theme-item" data-mode="dark" role="menuitemradio">
            <svg class="ti-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <span class="ti-label">Темна</span>
            <svg class="ti-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="theme-item" data-mode="auto" role="menuitemradio">
            <svg class="ti-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3 A9 9 0 0 1 12 21 Z" fill="currentColor" stroke="none"/></svg>
            <span class="ti-label">Системна</span>
            <svg class="ti-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
      </div>
      <button class="sync-pill" id="syncBtn" data-state="synced" aria-label="Стан синхронізації">
        <span class="sp-dot"></span><span class="sp-text" id="spText">Синхронізовано</span>
      </button>
    </div>
  </header>

  <!-- ===== FILTER ROW (chrome, статично — seg + date; НЕ релокується) ===== -->
  <div class="filter-row" id="filterRow">
    <div class="seg" id="seg" role="tablist" aria-label="Режим">
      <button class="seg-i" data-f="work" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Робочий
      </button>
      <button class="seg-i" data-f="vibe" role="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        Вайб
      </button>
      <button class="seg-i" data-f="all" role="tab">Всі</button>
    </div>
    <button class="date-btn" id="dateBtn" aria-label="Вибрати дату">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span id="dateLbl">—</span>
    </button>
  </div>

  <!-- ===== JOURNAL STATS BAR (pinned chrome, ПІД filter-row — лише журнал) ===== -->
  <div class="jstats-bar" id="jStats" hidden></div>

  <!-- ===== SCREENS ===== -->
  <div class="screens">
    <div class="screen active" id="sc-overview"><div class="scroll-a" id="ov-scroll"></div></div>
    <div class="screen" id="sc-journal"><div class="scroll-a" id="jr-scroll">
      <div id="jr-controls">
        <!-- SEARCH ROW (Журнал) — перший елемент скролу, дихає під pinned chrome -->
        <div class="search-row" id="searchRow" hidden>
          <svg class="sr-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input class="sr-inp" id="jSearch" type="search" inputmode="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="search" placeholder="Пошук: маршрут, адреса, АЗС…">
          <button class="sr-clear" id="jSearchClear" type="button" aria-label="Очистити пошук" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div id="jr-list"></div>
    </div></div>
    <div class="screen" id="sc-fuel"><div class="scroll-a" id="fl-scroll"></div></div>
    <div class="screen" id="sc-month"><div class="scroll-a" id="mo-scroll"></div></div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav" id="bnav">
    <button class="nav-i act" data-tab="overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
      Огляд
    </button>
    <button class="nav-i" data-tab="journal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Журнал
    </button>
    <button class="nav-i" data-tab="fuel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22V4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v18"/><path d="M3 12h10"/><path d="M16 8l3 3v7a2 2 0 0 1-4 0V5"/><path d="M19 11h2"/></svg>
      Паливо
    </button>
    <button class="nav-i" data-tab="month">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Місяць
    </button>
  </nav>
</div>

<!-- ===== SHEET: Action menu ===== -->
<div class="sh-bg" id="sh-menu">
  <div class="sh-box">
    <div class="sh-grip-w"><div class="sh-grip"></div></div>
    <div class="sh-head"><span class="sh-title">Konstantinov A.</span><button class="sh-x" onclick="closeSheet('sh-menu')" aria-label="Закрити">×</button></div>
    <div class="sh-body" id="menu-list"></div>
  </div>
</div>

<!-- ===== SHEET: Date picker ===== -->
<div class="sh-bg" id="sh-date">
  <div class="sh-box">
    <div class="sh-grip-w"><div class="sh-grip"></div></div>
    <div class="sh-head"><span class="sh-title">Оберіть період</span><button class="sh-x" onclick="closeSheet('sh-date')" aria-label="Закрити">×</button></div>
    <div class="sh-body">
      <div class="cal-h">
        <span class="cal-my" id="calMY">—</span>
        <div class="cal-nav">
          <button id="calPrev" type="button" aria-label="Попередній місяць"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button id="calNext" type="button" aria-label="Наступний місяць"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
      </div>
      <div class="cal-wd"><span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Нд</span></div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-hint" id="calHint">Тапни день — або початок і кінець діапазону</div>
      <button class="chip-btn" id="todayBtn" style="width:100%;padding:11px;text-align:center;margin-top:4px">Сьогодні</button>
      <div class="cal-foot">
        <button class="cal-reset" id="calReset" type="button">Скинути</button>
        <button class="cal-apply" id="calApply" type="button">Показати</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== SHEET: New record ===== -->
<div class="sh-bg" id="sh-rec">
  <div class="sh-box">
    <div class="sh-grip-w"><div class="sh-grip"></div></div>
    <div class="sh-head"><span class="sh-title" id="rec-title">Новий запис</span><button class="sh-x" onclick="closeSheet('sh-rec')" aria-label="Закрити">×</button></div>
    <div class="sh-body">
      <div class="fld"><label class="fld-l">Тип</label>
        <div class="type-seg" id="r-type" role="group" aria-label="Тип поїздки">
          <button type="button" class="ty-i" data-ty="work">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Робочий
          </button>
          <button type="button" class="ty-i" data-ty="vibe">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
            Вайб
          </button>
        </div>
      </div>
      <div class="fld-row">
        <div class="fld"><label class="fld-l" for="r-date">Дата</label><input class="inp" type="date" id="r-date" autocomplete="off"></div>
        <div class="fld"><label class="fld-l" for="r-time">Час</label><input class="inp" type="time" id="r-time" autocomplete="off"></div>
      </div>
      <div class="fld"><label class="fld-l" for="r-route">Маршрут</label><input class="inp" type="text" id="r-route" enterkeyhint="next" autocomplete="off" spellcheck="false" placeholder="Лівий берег → Центр"></div>
      <div class="fld-row">
        <div class="fld"><label class="fld-l" for="r-odo-start">Було</label><input class="inp" type="text" id="r-odo-start" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" enterkeyhint="next" autocomplete="off" spellcheck="false" placeholder="17 742"></div>
        <div class="fld"><label class="fld-l" for="r-odo">Стало</label><input class="inp" type="text" id="r-odo" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" enterkeyhint="next" autocomplete="off" spellcheck="false" placeholder="17 768"></div>
      </div>
      <div class="fld-row is-hidden"><!-- B21.1: «Запас ходу» прихований (опц. введення; годує лише Tab-3 fallback). DOM лишається → save читає '', edit seed зберігає range. -->
        <div class="fld"><label class="fld-l" for="r-range">Запас ходу (км)</label><input class="inp" type="text" id="r-range" inputmode="numeric" pattern="[0-9]*" enterkeyhint="next" autocomplete="off" placeholder="222"></div>
        <div class="fld" aria-hidden="true"></div>
      </div>
      <div class="fld"><label class="fld-l">Рівень палива</label><div class="fuel-sel" id="r-fuel"></div></div>
      <div class="fld"><label class="fld-l" for="r-note">Примітка</label><textarea class="inp" id="r-note" rows="2" maxlength="120" enterkeyhint="done" autocomplete="off" spellcheck="false" placeholder="напр. «север-калин-правда» або «вайб 16км»"></textarea><div class="char-c"><span id="r-cc">0</span>/120</div></div>
      <div class="sh-foot">
        <button class="btn-sec" onclick="closeSheet('sh-rec')">Скасувати</button>
        <button class="btn-pri" id="r-save">Зберегти запис</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== SHEET: Refuel ===== -->
<div class="sh-bg" id="sh-rf">
  <div class="sh-box">
    <div class="sh-grip-w"><div class="sh-grip"></div></div>
    <div class="sh-head"><span class="sh-title" id="rf-title">Заправка</span><button class="sh-x" onclick="closeSheet('sh-rf')" aria-label="Закрити">×</button></div>
    <div class="sh-body">
      <div class="fld-row">
        <div class="fld"><label class="fld-l" for="f-date">Дата</label><input class="inp" type="date" id="f-date" autocomplete="off"></div>
        <div class="fld"><label class="fld-l" for="f-time">Час</label><input class="inp" type="time" id="f-time" autocomplete="off"></div>
      </div>
      <div class="fld"><label class="fld-l">АЗС</label>
        <div class="pk" id="f-azs">
          <button type="button" class="inp pk-btn" id="f-azs-btn" data-val="WOG"><span id="f-azs-cur">WOG</span><svg class="pk-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
          <div class="pk-list" id="f-azs-list" hidden></div>
          <input class="inp" type="text" id="f-azs-other" enterkeyhint="next" autocomplete="off" spellcheck="false" placeholder="Введіть назву АЗС" style="display:none;margin-top:8px">
        </div>
      </div>
      <div class="fld"><label class="fld-l" for="f-liters">Кількість літрів</label>
        <div class="fld-cc"><input class="inp" type="text" id="f-liters" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" enterkeyhint="next" autocomplete="off" placeholder="30.50"><button class="chip-btn" id="f-full">Повний бак</button></div>
      </div>
      <div class="fld-row">
        <div class="fld"><label class="fld-l" for="f-price">Ціна за літр (₴)</label><input class="inp" type="text" id="f-price" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" enterkeyhint="next" autocomplete="off" placeholder="54.90"></div>
        <div class="fld"><label class="fld-l" for="f-sum">Сума (₴)</label><input class="inp" type="text" id="f-sum" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" enterkeyhint="next" autocomplete="off" placeholder="авто"></div>
      </div>
      <div class="fld"><label class="fld-l">Тип палива</label>
        <div class="pk" id="f-type-pk">
          <button type="button" class="inp pk-btn" id="f-type-btn" data-val="А-95"><span id="f-type-cur">А-95</span><svg class="pk-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
          <div class="pk-list" id="f-type-list" hidden></div>
        </div>
      </div>
      <div class="fld"><label class="fld-l" for="f-odo">Одометр</label><input class="inp" type="text" id="f-odo" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" enterkeyhint="next" autocomplete="off" placeholder="17 742"></div>
      <div class="fld"><label class="fld-l">Рівень після заправки</label><div class="fuel-sel" id="f-fuel"></div></div>
      <div class="fld"><label class="fld-l" for="f-note">Примітка</label><textarea class="inp" id="f-note" rows="2" maxlength="120" enterkeyhint="done" autocomplete="off" spellcheck="false" placeholder="напр.: повний бак, акційна ціна, чек не зберігся"></textarea><div class="char-c"><span id="f-cc">0</span>/120</div></div>
      <div class="sh-foot">
        <button class="btn-sec" onclick="closeSheet('sh-rf')">Скасувати</button>
        <button class="btn-pri" id="f-save">Зберегти заправку</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== SHEET: generic content (settings/export/archive/help/about/sync) ===== -->
<div class="sh-bg" id="sh-gen">
  <div class="sh-box">

// Model B міграція mv:2 (one-shot, idempotent). Бекфіл odoStart глобальним ланцюгом, прибрати збережене km.
function migrateV2(o){
  if(!o||o.mv>=2)return false;                       // idempotent guard: вже мігровано → нічого
  const records=o.records||[], refuels=o.refuels||[];
  // хронологічний список END-одометрів (записи .odo + заправки .odo)
  const ev=[];
  records.forEach(r=>{if(r.odo!=null)ev.push({date:r.date,time:r.time,odo:+r.odo});});
  refuels.forEach(r=>{if(r.odo!=null)ev.push({date:r.date,time:r.time,odo:+r.odo});});
  ev.sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));
  records.forEach(r=>{
    if(r.odoStart==null){
      let prevOdo=null;
      for(const e of ev){const before=(e.date<r.date)||(e.date===r.date&&e.time<r.time);if(before)prevOdo=e.odo;}
      // genesis (нема попередника): зберегти історичну відстань першої поїздки
      r.odoStart=(prevOdo!=null)?prevOdo:(r.km!=null&&r.odo!=null?(+r.odo-+r.km):(r.odo!=null?+r.odo:null));
    }
    delete r.km;                                       // km більше НЕ зберігається
  });
  o.mv=2;
  return true;
}
function loadData(){
  const raw=lsGet(DATA_KEY);
  if(raw){try{const o=JSON.parse(raw);const changed=migrateV2(o);S.records=o.records||[];S.refuels=o.refuels||[];if(changed)saveData();return;}catch(e){}}
  seed();saveData();
}

// ---------- day queries (per-day base, activeDay delegates) ----------
function recordsOf(day){return S.records.filter(r=>r.date===day).sort((a,b)=>a.time.localeCompare(b.time));}
function refuelsOf(day){return S.refuels.filter(r=>r.date===day).sort((a,b)=>a.time.localeCompare(b.time));}
function filteredOf(day){const rs=recordsOf(day);if(S.filter==='all')return rs;return rs.filter(r=>r.type===(S.filter==='work'?'work':'vibe'));}
function dayKm(day){return filteredOf(day).reduce((s,r)=>s+(tripKm(r)||0),0);}
// ---- Journal view model (D5): єдине джерело — scope(journalDays) + тип(filteredOf) + search ----
function matchSearch(r){
  const q=(S.search||'').trim().toLowerCase();
  if(!q)return true;
  const hay=(r.route!=null)?((r.route||'')+' '+(r.addr||'')):((r.azs||'')+' '+(r.ftype||''));
  return hay.toLowerCase().includes(q);
}
function jRecsOf(day){return filteredOf(day).filter(matchSearch);}   // тип AND search
function jRfsOf(day){return refuelsOf(day).filter(matchSearch);}     // заправки: search only, ігнорують тип (D5)
function jDayKm(day){return jRecsOf(day).reduce((s,r)=>s+(tripKm(r)||0),0);}
function lastFuelOf(day){const ev=recordsOf(day).concat(refuelsOf(day)).filter(e=>e.fuel!=null).sort((a,b)=>a.time.localeCompare(b.time));return ev.length?ev[ev.length-1].fuel:null;}
function dayRecords(){return recordsOf(S.activeDay);}
function dayRefuels(){return refuelsOf(S.activeDay);}
